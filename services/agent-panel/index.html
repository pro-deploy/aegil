<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KROKKI · панель администратора</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="tc" content="#161311">
<script>
  // Без мигания: тему выставляем синхронно до первой отрисовки.
  (function () {
    try {
      var t = localStorage.getItem('ac_theme');
      if (t !== 'light' && t !== 'dark') {
        t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
<style>
  /* PLATA-система (ADR-0033, DESIGN.md). Тёмная тема первична, светлая доведена. OKLCH.
     committed-минимализм: нейтраль несёт поверхность, оранжевый акцент дозирован 60-30-10. */
  :root, [data-theme="dark"] {
    --bg: oklch(0.17 0.008 45); --surface: oklch(0.21 0.010 45);
    --elevated: oklch(0.255 0.012 45); --overlay: oklch(0.19 0.010 45 / 0.72);
    --ink: oklch(0.96 0.006 45); --muted: oklch(0.74 0.010 45); --subtle: oklch(0.66 0.010 45);
    --border: oklch(1 0 0 / 0.10); --edge: oklch(1 0 0 / 0.06);
    --accent: oklch(0.72 0.20 42); --accent-hover: oklch(0.77 0.185 43);
    --accent-soft: oklch(0.72 0.20 42 / 0.15); --on-accent: oklch(0.17 0.02 45);
    --ok: oklch(0.78 0.15 155); --warn: oklch(0.82 0.15 78); --bad: oklch(0.70 0.19 25);
    --shadow: 0 1px 0 0 var(--edge) inset, 0 10px 30px -12px oklch(0 0 0 / 0.6);
    --ring: oklch(0.72 0.20 42 / 0.55);
  }
  [data-theme="light"] {
    --bg: oklch(0.98 0.004 45); --surface: oklch(1 0 0);
    --elevated: oklch(0.995 0.002 45); --overlay: oklch(0.20 0.01 45 / 0.42);
    --ink: oklch(0.22 0.010 45); --muted: oklch(0.45 0.010 45); --subtle: oklch(0.47 0.010 45);
    --border: oklch(0.20 0.01 45 / 0.12); --edge: transparent;
    --accent: oklch(0.66 0.21 40); --accent-hover: oklch(0.61 0.20 39);
    --accent-soft: oklch(0.66 0.21 40 / 0.10); --on-accent: oklch(0.16 0.02 45);
    --ok: oklch(0.55 0.14 155); --warn: oklch(0.60 0.13 72); --bad: oklch(0.55 0.20 25);
    --shadow: 0 1px 2px oklch(0.2 0.01 45 / 0.06), 0 12px 28px -16px oklch(0.2 0.01 45 / 0.20);
    --ring: oklch(0.66 0.21 40 / 0.45);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    font-variant-numeric: tabular-nums; overscroll-behavior: none;
  }
  .app { display: flex; flex-direction: column; height: 100dvh; max-width: 760px; margin: 0 auto; }

  /* Шапка */
  header {
    position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 10px;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px; background: var(--surface);
    border-bottom: 1px solid var(--border); box-shadow: 0 1px 0 0 var(--edge) inset;
  }
  .brand { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .logo { width: 30px; height: 30px; border-radius: 9px; flex: none; }
  .brand .name { font-weight: 700; letter-spacing: -0.01em; }
  .brand .sub { display: block; font-size: 11.5px; color: var(--subtle); margin-top: -2px; }
  .spacer { flex: 1; }
  .iconbtn {
    width: 44px; height: 44px; display: grid; place-items: center; border-radius: 12px;
    border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer;
    transition: background .18s, color .18s;
  }
  .iconbtn:hover { background: var(--elevated); color: var(--ink); }
  .iconbtn[aria-pressed="true"] { color: var(--accent); background: var(--accent-soft); }
  .iconbtn svg { width: 21px; height: 21px; }

  /* Лента */
  main { flex: 1; overflow-y: auto; padding: 16px 14px 8px; scroll-behavior: smooth; }
  .row { display: flex; margin: 12px 0; }
  .row.op { justify-content: flex-end; }
  .enter { animation: enter .22s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes enter { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

  .bubble { max-width: 84%; padding: 10px 13px; border-radius: 16px; white-space: pre-wrap;
            word-break: break-word; line-height: 1.45; }
  .op .bubble { background: var(--accent); color: var(--on-accent); border-bottom-right-radius: 5px;
                font-weight: 500; }
  .sys .bubble { background: var(--surface); border: 1px solid var(--border);
                 border-bottom-left-radius: 5px; box-shadow: var(--shadow); }

  /* Карточка вердикта */
  .card { max-width: 92%; width: 100%; background: var(--surface); border: 1px solid var(--border);
          border-radius: 18px; box-shadow: var(--shadow); padding: 14px; }
  .v-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .chip { display: inline-flex; align-items: center; gap: 7px; padding: 5px 11px 5px 9px;
          background: var(--elevated); border: 1px solid var(--border); border-radius: 999px;
          font-weight: 600; font-size: 13.5px; }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .chip.ok .dot { background: var(--ok); } .chip.warn .dot { background: var(--warn); }
  .chip.bad .dot { background: var(--bad); }
  .v-conf { color: var(--subtle); font-size: 12.5px; }
  .v-label { text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; font-weight: 600;
             color: var(--subtle); margin: 12px 0 3px; }
  .v-text { line-height: 1.5; }
  .v-ev { margin-top: 6px; padding: 8px 10px; background: var(--elevated); border-radius: 10px;
          font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace; overflow-x: auto; }

  /* Ответ агента: компактно и без обводок. Чипы команд, крупный ответ, сноска рассуждения. */
  .bubble.agent { max-width: 92%; }
  .ag-cmds { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
  .cmd-chip { display: inline-flex; align-items: center; gap: 7px; padding: 4px 11px 4px 9px;
              border: 0; border-radius: 999px; background: var(--elevated); color: var(--ink);
              font: 500 12.5px/1.4 -apple-system, system-ui, sans-serif; cursor: default;
              max-width: 100%; transition: background .16s; }
  .cmd-chip.has-out { cursor: pointer; }
  .cmd-chip.has-out:hover { background: var(--accent-soft); }
  .cmd-chip.open { background: var(--accent-soft); }
  .cmd-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--ok); }
  .cmd-chip.bad .cmd-dot { background: var(--bad); }
  .cmd-chip.warn .cmd-dot { background: var(--warn); }
  .cmd-node { flex: none; font-size: 10.5px; font-weight: 700; letter-spacing: .02em;
              color: var(--accent); background: var(--accent-soft); padding: 1px 7px; border-radius: 999px; }
  .cmd-text { font: 12px/1.4 ui-monospace, "SF Mono", Menlo, monospace; color: var(--muted);
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cmd-out { flex-basis: 100%; width: 100%; margin: 0; padding: 9px 11px; background: var(--elevated);
             border-radius: 12px; font: 12px/1.55 ui-monospace, "SF Mono", Menlo, monospace;
             color: var(--ink); white-space: pre-wrap; word-break: break-word; overflow-x: auto;
             animation: enter .16s ease both; }
  .ag-answer { line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .ag-notes { margin-top: 10px; }
  .ag-notes > summary { cursor: pointer; list-style: none; color: var(--subtle); font-size: 12.5px;
                        font-weight: 600; user-select: none; }
  .ag-notes > summary::-webkit-details-marker { display: none; }
  .ag-notes > summary::before { content: "+ "; font-weight: 700; }
  .ag-notes[open] > summary::before { content: "\2212 "; font-weight: 700; }
  .ag-note { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 7px; }
  .v-ev .src { color: var(--accent); display: block; margin-bottom: 2px; }
  .v-ev .snip { color: var(--muted); white-space: pre-wrap; word-break: break-all; }
  .v-report { line-height: 1.55; }
  .v-meta { color: var(--subtle); font-size: 12px; margin-top: 12px; }

  /* Карточка подтверждения */
  .confirm { border: 1px solid var(--accent); background: var(--accent-soft); }
  .confirm .t { display: flex; align-items: center; gap: 8px; font-weight: 700; margin-bottom: 6px; }
  .confirm .t svg { width: 18px; height: 18px; color: var(--accent); }
  .confirm .hint { color: var(--muted); font-size: 13px; margin: 10px 0 8px; }
  .confirm input { width: 100%; padding: 12px; font-size: 16px; border-radius: 12px;
                   border: 1px solid var(--border); background: var(--surface); color: var(--ink); }
  .confirm input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
  .cbtns { display: flex; gap: 8px; margin-top: 10px; }
  .btn { min-height: 44px; padding: 0 16px; border-radius: 12px; border: 1px solid transparent;
         font-weight: 600; font-size: 15px; cursor: pointer; transition: filter .15s, opacity .15s; }
  .btn.primary { background: var(--accent); color: var(--on-accent); flex: 1; }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost { background: transparent; border-color: var(--border); color: var(--muted); }

  /* Скелетон загрузки */
  .skel { max-width: 60%; height: 44px; border-radius: 16px; border-bottom-left-radius: 5px;
          background: linear-gradient(100deg, var(--surface) 30%, var(--elevated) 50%, var(--surface) 70%);
          background-size: 220% 100%; animation: shimmer 1.15s ease-in-out infinite; }
  @keyframes shimmer { from { background-position: 180% 0; } to { background-position: -20% 0; } }

  /* Композер (зона большого пальца) */
  footer { padding: 8px 12px calc(env(safe-area-inset-bottom) + 10px); background: var(--surface);
           border-top: 1px solid var(--border); box-shadow: 0 -1px 0 0 var(--edge) inset; }
  .composer { display: flex; align-items: flex-end; gap: 8px; }
  .composer textarea {
    flex: 1; resize: none; max-height: 120px; min-height: 46px; padding: 12px 14px; font: inherit;
    font-size: 16px; line-height: 1.35; border-radius: 16px; border: 1px solid var(--border);
    background: var(--bg); color: var(--ink);
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
  .round { width: 46px; height: 46px; flex: none; border-radius: 50%; border: 1px solid var(--border);
           background: var(--elevated); color: var(--ink); display: grid; place-items: center; cursor: pointer;
           transition: transform .12s, background .15s; }
  .round:active { transform: scale(0.94); }
  .round svg { width: 22px; height: 22px; }
  .round.send { background: var(--accent); color: var(--on-accent); border-color: transparent; }
  .round.listening { color: var(--accent); border-color: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--accent-soft); } 50% { box-shadow: 0 0 0 8px transparent; } }

  /* Экран входа */
  .gate { position: fixed; inset: 0; z-index: 50; display: grid; place-items: center; padding: 20px;
          background: var(--overlay); }
  .gate .panel { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border);
                 border-radius: 20px; box-shadow: var(--shadow); padding: 22px; text-align: center; }
  .gate .logo { width: 48px; height: 48px; margin: 0 auto 12px; border-radius: 14px; }
  .gate h1 { font-size: 19px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .gate p { color: var(--subtle); font-size: 13px; margin: 0 0 16px; }
  .gate input { width: 100%; padding: 13px; font-size: 16px; border-radius: 12px; text-align: center;
                border: 1px solid var(--border); background: var(--bg); color: var(--ink); margin-bottom: 10px; }
  .gate input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
  .hidden { display: none !important; }

  /* Бейдж непрочитанного на колоколе */
  .iconbtn { position: relative; }
  .badge { position: absolute; top: 4px; right: 4px; min-width: 17px; height: 17px; padding: 0 4px;
           border-radius: 9px; background: var(--bad); color: #fff; font-size: 10.5px; line-height: 17px;
           font-weight: 700; text-align: center; box-shadow: 0 0 0 2px var(--surface); }

  /* Центр инцидентов */
  #incidents { flex: 1; overflow-y: auto; padding: 14px 14px 8px; }
  .inc-head { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between;
              padding: 4px 2px 10px; background: var(--bg); }
  .inc-head h2 { font-size: 17px; margin: 0; letter-spacing: -0.01em; }
  .link { background: none; border: 0; color: var(--accent); font: inherit; font-weight: 600;
          cursor: pointer; min-height: 44px; padding: 8px; }
  .inc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
              box-shadow: var(--shadow); padding: 13px 14px; margin-bottom: 10px; }
  .inc-card.unread { border-color: var(--accent); }
  .inc-top { display: flex; align-items: center; gap: 9px; }
  .count { margin-left: auto; padding: 3px 10px; border-radius: 999px; background: var(--accent-soft);
           color: var(--accent); font-weight: 700; font-size: 13px; }
  .inc-title { margin: 10px 0 5px; font-weight: 600; line-height: 1.4; }
  .inc-meta { color: var(--subtle); font-size: 12px; }
  .inc-more { margin-top: 10px; }
  .inc-more summary { cursor: pointer; color: var(--accent); font-weight: 600; font-size: 13.5px;
                      list-style: none; min-height: 32px; display: flex; align-items: center; }
  .inc-more summary::-webkit-details-marker { display: none; }
  .inc-body { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 10px; }
  .inc-empty { text-align: center; color: var(--subtle); padding: 56px 24px; line-height: 1.6; }
  .inc-empty .big { color: var(--muted); font-weight: 600; font-size: 16px; margin-bottom: 4px; }

  /* Номер инцидента с копированием и кнопка решения */
  .inc-id { display: inline-flex; align-items: center; gap: 4px; margin-left: 8px; }
  .inc-code { font: 12px ui-monospace, "SF Mono", Menlo, monospace; color: var(--muted);
              background: var(--elevated); padding: 2px 7px; border-radius: 6px; letter-spacing: 0.02em; }
  .inc-copy { display: grid; place-items: center; width: 26px; height: 26px; border: 0; flex: none;
              background: transparent; color: var(--subtle); cursor: pointer; border-radius: 6px; }
  .inc-copy:hover { color: var(--ink); background: var(--elevated); }
  .inc-copy svg { width: 14px; height: 14px; }
  .btn-solve { margin-top: 12px; min-height: 42px; padding: 0 16px; border-radius: 12px;
               border: 1px solid var(--accent); background: var(--accent-soft); color: var(--accent);
               font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex;
               align-items: center; gap: 7px; transition: background .15s, color .15s; }
  .btn-solve:hover { background: var(--accent); color: var(--on-accent); }
  .btn-solve:disabled { opacity: 0.55; cursor: progress; }
  .btn-solve svg { width: 16px; height: 16px; }

  /* Фильтры ленты инцидентов и разделители по дням (ADR-0038) */
  .inc-filters { display: flex; gap: 6px; padding: 0 2px 10px; }
  .fchip { min-height: 34px; padding: 5px 13px; border-radius: 999px; border: 1px solid var(--border);
           background: var(--surface); color: var(--muted); font: inherit; font-size: 13px;
           font-weight: 600; cursor: pointer; transition: background .15s, color .15s; }
  .fchip[aria-pressed="true"] { background: var(--accent-soft); color: var(--accent);
                                border-color: var(--accent); }
  .inc-day { display: flex; align-items: center; gap: 10px; margin: 16px 0 10px;
             color: var(--subtle); font-size: 12px; font-weight: 700;
             text-transform: uppercase; letter-spacing: 0.05em; }
  .inc-day::before, .inc-day::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* Бейдж жизненного цикла на карточке и отметка «кем решено» */
  .lc { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px;
        font-size: 11.5px; font-weight: 700; letter-spacing: 0.02em;
        background: var(--elevated); border: 1px solid var(--border); color: var(--muted); }
  .lc.good { background: var(--accent-soft); border-color: transparent; color: var(--ok); }
  .lc.attn { color: var(--bad); border-color: var(--bad); }
  .lc.work { color: var(--warn); border-color: var(--warn); }
  .inc-resolved { color: var(--subtle); font-size: 12px; margin-top: 4px; }
  .btn-ack { margin-top: 12px; margin-right: 8px; min-height: 42px; padding: 0 16px;
             border-radius: 12px; border: 1px solid var(--border); background: var(--elevated);
             color: var(--ink); font-weight: 600; font-size: 14px; cursor: pointer; }
  .btn-ack:hover { border-color: var(--accent); color: var(--accent); }

  /* Палитра команд над композером: появляется по вводу «/» первым символом */
  footer { position: relative; }
  .palette { position: absolute; left: 12px; right: 12px; bottom: calc(100% + 6px); z-index: 30;
             max-height: 260px; overflow-y: auto; background: var(--surface);
             border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
             padding: 6px; }
  .pal-item { display: flex; align-items: baseline; gap: 10px; width: 100%; text-align: left;
              min-height: 40px; padding: 8px 10px; border: 0; border-radius: 10px;
              background: transparent; color: var(--ink); font: inherit; cursor: pointer; }
  .pal-item .pn { font: 600 13.5px ui-monospace, "SF Mono", Menlo, monospace; color: var(--accent);
                  flex: none; }
  .pal-item .pd { color: var(--muted); font-size: 13px; min-width: 0; overflow: hidden;
                  text-overflow: ellipsis; white-space: nowrap; }
  .pal-item .pc { margin-left: auto; flex: none; color: var(--subtle); font-size: 11px; }
  .pal-item.sel, .pal-item:hover { background: var(--accent-soft); }

  /* Поверхность агента-девопса (ADR-0041): лента шагов рассуждения, карточки подтверждения
     finance и destructive, переключатель режима auto/manual, панель состояния агента. */
  #agent { flex: 1; overflow-y: auto; padding: 14px 14px 8px; }
  .ag-head { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 10px;
             padding: 4px 2px 10px; background: var(--bg); }
  .ag-head h2 { font-size: 17px; margin: 0; letter-spacing: -0.01em; }
  /* Переключатель режима auto/manual: сегментированный тумблер. */
  .mode-seg { margin-left: auto; display: inline-flex; background: var(--elevated);
              border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .mode-seg button { min-height: 32px; padding: 4px 14px; border: 0; border-radius: 999px;
                     background: transparent; color: var(--muted); font: inherit; font-size: 13px;
                     font-weight: 600; cursor: pointer; transition: background .15s, color .15s; }
  .mode-seg button[aria-pressed="true"] { background: var(--accent); color: var(--on-accent); }

  /* Панель состояния агента: режим, остаток бюджета, кулдауны, последние действия, предохранитель. */
  .ag-state { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
              box-shadow: var(--shadow); padding: 13px 14px; margin-bottom: 12px; }
  .ag-state .row2 { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .stat { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px;
          background: var(--elevated); border: 1px solid var(--border); font-size: 13px; font-weight: 600; }
  .stat .k { color: var(--subtle); font-weight: 600; }
  .stat.attn { color: var(--bad); border-color: var(--bad); }
  .stat.warn { color: var(--warn); border-color: var(--warn); }
  .ag-label { text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; font-weight: 600;
              color: var(--subtle); margin: 10px 0 4px; }
  .ag-list { margin: 0; padding: 0; list-style: none; }
  .ag-list li { font-size: 13px; color: var(--muted); padding: 3px 0; line-height: 1.45; }
  .ag-list li .mono { font: 12px ui-monospace, "SF Mono", Menlo, monospace; }

  /* Лента шагов рассуждения агента: каждый шаг это карточка с типом, командой, узлом, классом. */
  .ag-step { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--edge);
             border-radius: 12px; padding: 10px 12px; margin: 8px 0; box-shadow: var(--shadow); }
  .ag-step.observe { border-left-color: var(--ok); }
  .ag-step.act, .ag-step.node_cmd { border-left-color: var(--warn); }
  .ag-step.explain { border-left-color: var(--accent); }
  .ag-step.done { border-left-color: var(--ok); }
  .ag-step.error { border-left-color: var(--bad); }
  .ag-step .st-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .st-kind { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
             color: var(--subtle); }
  .st-node { font-size: 11.5px; color: var(--accent); font-weight: 600; }
  .st-outcome { margin-left: auto; font-size: 11.5px; font-weight: 700; }
  .st-outcome.ok { color: var(--ok); } .st-outcome.bad { color: var(--bad); }
  .st-outcome.wait { color: var(--warn); }
  .st-cmd { font: 12.5px ui-monospace, "SF Mono", Menlo, monospace; color: var(--ink);
            background: var(--elevated); border-radius: 8px; padding: 6px 9px; margin: 4px 0;
            overflow-x: auto; white-space: pre; }
  .st-why { color: var(--subtle); font-size: 12.5px; margin-top: 2px; }
  .st-class { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .st-text { line-height: 1.5; }
  .st-out { margin-top: 5px; font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
            color: var(--muted); white-space: pre-wrap; word-break: break-word; max-height: 180px;
            overflow-y: auto; background: var(--elevated); border-radius: 8px; padding: 6px 9px; }

  /* Пронумерованные варианты решения в ручном режиме: оператор выбирает номер. */
  .ag-options { margin: 8px 0; }
  .ag-opt { display: flex; align-items: flex-start; gap: 10px; width: 100%; text-align: left;
            min-height: 44px; padding: 10px 12px; margin: 6px 0; border-radius: 12px;
            border: 1px solid var(--border); background: var(--surface); color: var(--ink);
            font: inherit; cursor: pointer; transition: border-color .15s, background .15s; }
  .ag-opt:hover { border-color: var(--accent); background: var(--accent-soft); }
  .ag-opt .onum { flex: none; width: 24px; height: 24px; border-radius: 50%; display: grid;
                  place-items: center; background: var(--accent-soft); color: var(--accent);
                  font-weight: 700; font-size: 13px; }
  .ag-opt .obody { min-width: 0; }
  .ag-opt .ocmd { font: 12.5px ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; }
  .ag-opt .orisk { color: var(--subtle); font-size: 12px; margin-top: 2px; }

  /* Композер поверхности агента: та же зона большого пальца, но своя лента. */
  .ag-empty { text-align: center; color: var(--subtle); padding: 40px 24px; line-height: 1.6; }
  .ag-empty .big { color: var(--muted); font-weight: 600; font-size: 16px; margin-bottom: 4px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; scroll-behavior: auto !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <img class="logo" src="/icon.svg" alt="">
      <div style="min-width:0">
        <span class="name">KROKKI</span>
        <span class="sub">панель администратора · локально</span>
      </div>
    </div>
    <span class="spacer"></span>
    <button class="iconbtn" id="clear" aria-label="Очистить чат" title="Очистить чат"></button>
    <button class="iconbtn" id="agentBtn" aria-pressed="false" aria-label="Агент-девопс" title="Агент-девопс"></button>
    <button class="iconbtn" id="bell" aria-pressed="false" aria-label="Центр инцидентов" title="Центр инцидентов"></button>
    <button class="iconbtn" id="voice" aria-pressed="false" aria-label="Озвучивать ответы" title="Озвучивать ответы"></button>
    <button class="iconbtn" id="theme" aria-label="Сменить тему" title="Сменить тему"></button>
  </header>

  <main id="log" aria-live="polite"></main>

  <section id="incidents" class="hidden" aria-label="Центр инцидентов">
    <div class="inc-head">
      <h2>Инциденты</h2>
      <button class="link" id="readAll">Прочитать всё</button>
    </div>
    <div class="inc-filters" role="group" aria-label="Фильтр по статусу">
      <button class="fchip" data-f="all" aria-pressed="true">Все</button>
      <button class="fchip" data-f="attention" aria-pressed="false">Требуют внимания</button>
      <button class="fchip" data-f="resolved" aria-pressed="false">Решённые</button>
    </div>
    <div id="incList"></div>
  </section>

  <section id="agent" class="hidden" aria-label="Агент-девопс">
    <div class="ag-head">
      <h2>Агент-девопс</h2>
      <div class="mode-seg" role="group" aria-label="Режим агента">
        <button id="modeAuto" data-m="auto" aria-pressed="true">Авто</button>
        <button id="modeManual" data-m="manual" aria-pressed="false">Ручной</button>
      </div>
    </div>
    <div id="agState" class="ag-state"></div>
    <div id="agFeed"></div>
  </section>

  <footer id="composer">
    <div class="palette hidden" id="palette" role="listbox" aria-label="Палитра команд"></div>
    <div class="composer">
      <textarea id="inp" rows="1" placeholder="Сообщение или команда (/help)" enterkeyhint="send"></textarea>
      <button class="round mic" id="mic" aria-label="Голосовой ввод" title="Голосовой ввод"></button>
      <button class="round send" id="send" aria-label="Отправить" title="Отправить"></button>
    </div>
  </footer>
</div>

<div class="gate" id="gate">
  <div class="panel">
    <img class="logo" src="/icon.svg" alt="">
    <h1>Вход оператора</h1>
    <p>Локальная панель супер-администратора. Доступ по токену оператора.</p>
    <input id="tok" type="password" placeholder="Токен оператора" autocomplete="off">
    <button class="btn primary" id="enter" style="width:100%">Войти</button>
  </div>
</div>

<script>
const ICON = {
  send: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>',
  mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3"/></svg>',
  sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  spkOn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>',
  spkOff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>',
  warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
  bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.9 1.9 0 0 0 3.4 0"/></svg>',
  chat: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>',
  copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
  wrench: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0 5 5l-9 9a2.1 2.1 0 0 1-3-3l9-9z"/><path d="M14.7 6.3 18 3l3 3-3.3 3.3"/></svg>',
  agent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m7 9 3 3-3 3M13 15h4"/></svg>'
};
const SM = { healthy:{label:'Здоров', cls:'ok'}, degraded:{label:'Деградация', cls:'warn'}, incident:{label:'Инцидент', cls:'bad'} };
// Жизненный цикл группы инцидентов (ADR-0038): подпись и оттенок бейджа.
const LC = {
  new:               { label:'новый',            cls:'attn' },
  auto_fixing:       { label:'агент чинит',      cls:'work' },
  resolved_auto:     { label:'решено агентом',   cls:'good' },
  resolved_operator: { label:'решено оператором',cls:'good' },
  escalated:         { label:'эскалация',        cls:'attn' },
  acknowledged:      { label:'в работе',         cls:'work' }
};
const LC_RESOLVED = ['resolved_auto', 'resolved_operator'];

const log = document.getElementById('log');
const inp = document.getElementById('inp');
let TOKEN = localStorage.getItem('ac_token') || '';

// --- Тема ---
const themeBtn = document.getElementById('theme');
function paintTheme(){
  const t = document.documentElement.getAttribute('data-theme');
  themeBtn.innerHTML = t === 'dark' ? ICON.sun : ICON.moon;
  // Цвет системного статус-бара следует за темой и при ручном переключении.
  const tc = document.getElementById('tc');
  if(tc) tc.setAttribute('content', t === 'dark' ? '#161311' : '#faf7f4');
}
themeBtn.onclick = () => {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ac_theme', t); paintTheme();
};
paintTheme();

// --- Очистить чат и копирование ---
// Панель не хранит историю диалога на сервере: чат живёт в браузере, поэтому очистка это
// просто стирание ленты и возврат приветствия (новый чистый диалог).
const WELCOME = 'Панель супер-администратора KROKKI. Пишите обычным языком: «что с очередью», «разбери инциденты», «перезапусти застрявшие». Слэш-команды тоже работают, /help.';
const clearBtn = document.getElementById('clear'); clearBtn.innerHTML = ICON.trash;
clearBtn.onclick = () => { log.innerHTML = ''; bubble(WELCOME, 'sys'); };
function copyText(text, btn){
  const done = () => { if(btn){ const h = btn.innerHTML; btn.textContent = '✓';
    setTimeout(() => { btn.innerHTML = h; }, 1200); } };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => {});
  } else {
    const t = document.createElement('textarea'); t.value = text; t.style.position = 'fixed'; t.style.opacity = '0';
    document.body.appendChild(t); t.select(); try { document.execCommand('copy'); } catch(e){} t.remove(); done();
  }
}

// --- Озвучивание ответов ---
const voiceBtn = document.getElementById('voice');
let speakOn = localStorage.getItem('ac_speak') === '1';
function paintVoice(){ voiceBtn.innerHTML = speakOn ? ICON.spkOn : ICON.spkOff; voiceBtn.setAttribute('aria-pressed', speakOn); }
voiceBtn.onclick = () => { speakOn = !speakOn; localStorage.setItem('ac_speak', speakOn ? '1' : '0'); paintVoice();
  if(!speakOn && window.speechSynthesis) window.speechSynthesis.cancel(); };
paintVoice();
function speak(text){
  if(!speakOn || !text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text); u.lang = 'ru-RU'; u.rate = 1.03; window.speechSynthesis.speak(u);
}

// --- Голосовой ввод ---
const micBtn = document.getElementById('mic'); micBtn.innerHTML = ICON.mic;
document.getElementById('send').innerHTML = ICON.send;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false;
if(SR){
  rec = new SR(); rec.lang = 'ru-RU'; rec.interimResults = true; rec.continuous = false;
  rec.onresult = (e) => {
    let txt = ''; for(const r of e.results) txt += r[0].transcript;
    inp.value = txt; autoGrow();
    if(e.results[e.results.length - 1].isFinal){ setListen(false); send(); }
  };
  rec.onend = () => setListen(false);
  rec.onerror = () => setListen(false);
  micBtn.onclick = () => { if(listening){ rec.stop(); setListen(false); } else { try { rec.start(); setListen(true); } catch(_){} } };
} else {
  micBtn.disabled = true; micBtn.title = 'Голосовой ввод не поддерживается этим браузером'; micBtn.style.opacity = 0.4;
}
function setListen(on){ listening = on; micBtn.classList.toggle('listening', on); }

// --- Лента ---
function el(tag, cls, text){ const e = document.createElement(tag); if(cls) e.className = cls;
  if(text != null) e.textContent = text; return e; }
function place(row){ log.appendChild(row); row.classList.add('enter'); log.scrollTop = log.scrollHeight; }

function bubble(text, who){
  const row = el('div', 'row ' + who); const b = el('div', 'bubble', text); row.appendChild(b); place(row);
  if(who === 'sys') speak(text);
}

function verdictCard(d){
  const row = el('div', 'row sys'); const c = el('div', 'card verdict');
  const head = el('div', 'v-head');
  const m = SM[d.status] || { label: d.status || '-', cls: '' };
  const chip = el('span', 'chip ' + m.cls); chip.appendChild(el('i', 'dot')); chip.appendChild(el('span', null, m.label));
  head.appendChild(chip);
  if(d.confidence != null) head.appendChild(el('span', 'v-conf', 'уверенность ' + d.confidence + (d.band ? ' · ' + d.band : '')));
  c.appendChild(head);
  if(d.root_cause){ c.appendChild(el('div', 'v-label', 'Первопричина')); c.appendChild(el('div', 'v-text', d.root_cause)); }
  if(d.action){ c.appendChild(el('div', 'v-label', 'Рекомендация')); c.appendChild(el('div', 'v-text', d.action)); }
  if(d.evidence && d.evidence.length){
    c.appendChild(el('div', 'v-label', 'Свидетельства из логов'));
    d.evidence.forEach((e) => { const b = el('div', 'v-ev'); b.appendChild(el('span', 'src', e.source || ''));
      b.appendChild(el('span', 'snip', e.snippet || '')); c.appendChild(b); });
  }
  if(d.report){ c.appendChild(el('div', 'v-label', 'Отчёт')); c.appendChild(el('div', 'v-report', d.report)); }
  if(d.lines != null) c.appendChild(el('div', 'v-meta', 'проанализировано строк: ' + d.lines));
  row.appendChild(c); place(row); speak(d.speech || d.report);
}

function confirmCard(d){
  const row = el('div', 'row sys'); const c = el('div', 'card confirm');
  const t = el('div', 't'); const ic = document.createElement('span'); ic.innerHTML = ICON.warn;
  t.appendChild(ic.firstChild); t.appendChild(el('span', null, 'Подтверждение операции')); c.appendChild(t);
  c.appendChild(el('div', null, d.summary || ''));
  c.appendChild(el('div', 'hint', d.hint || 'Подтвердите операцию.'));
  const need = d.confirm_word || '';
  const word = el('input'); word.placeholder = need ? need : 'подтверждение'; word.setAttribute('autocomplete', 'off');
  const btns = el('div', 'cbtns');
  const ok = el('button', 'btn primary', 'Подтвердить'); ok.disabled = !!need;
  const no = el('button', 'btn ghost', 'Отмена');
  word.oninput = () => { ok.disabled = need ? (word.value.trim() !== need) : false; };
  ok.onclick = async () => { ok.disabled = true; const r = await api('/confirm', { token: d.token }); render(r); };
  no.onclick = () => { row.remove(); bubble('Операция отменена оператором.', 'sys'); };
  btns.appendChild(ok); btns.appendChild(no);
  if(need) c.appendChild(word);
  c.appendChild(btns); row.appendChild(c); place(row); speak(d.summary);
}

function agentReply(d){
  // Элегантный компактный ответ агента: сверху чипы выполненных команд (тег узла, точка статуса,
  // вывод раскрывается по клику), затем сам ответ крупно, а ход рассуждения под сноской.
  const row = el('div', 'row sys'); const b = el('div', 'bubble agent');
  if(d.cmds && d.cmds.length){
    const wrap = el('div', 'ag-cmds');
    d.cmds.forEach((c) => {
      const chip = el('button', 'cmd-chip ' + (c.blocked ? 'warn' : (c.ok ? 'ok' : 'bad')));
      chip.appendChild(el('i', 'cmd-dot'));
      if(c.node) chip.appendChild(el('span', 'cmd-node', c.node));
      chip.appendChild(el('span', 'cmd-text', c.cmd));
      wrap.appendChild(chip);
      if(c.out){
        const out = el('pre', 'cmd-out'); out.textContent = c.out; out.hidden = true;
        chip.classList.add('has-out');
        chip.onclick = () => { out.hidden = !out.hidden; chip.classList.toggle('open', !out.hidden); };
        wrap.appendChild(out);
      }
    });
    b.appendChild(wrap);
  }
  if(d.answer){ b.appendChild(el('div', 'ag-answer', d.answer)); }
  if(d.notes && d.notes.length > 1){
    const det = document.createElement('details'); det.className = 'ag-notes';
    const sum = document.createElement('summary'); sum.textContent = 'ход рассуждения'; det.appendChild(sum);
    d.notes.forEach((n) => det.appendChild(el('div', 'ag-note', n)));
    b.appendChild(det);
  }
  row.appendChild(b); place(row); speak(d.answer);
}

function render(data){
  if(!data){ bubble('Пустой ответ сервера.', 'sys'); return; }
  if(data.type === 'verdict') verdictCard(data);
  else if(data.type === 'confirm') confirmCard(data);
  else if(data.type === 'agent') agentReply(data);
  else bubble(data.text || JSON.stringify(data), 'sys');
}

// --- Сеть ---
async function api(path, body){
  const skel = el('div', 'row sys'); skel.appendChild(el('div', 'skel')); place(skel);
  try {
    const r = await fetch(path, { method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': 'Bearer ' + TOKEN },
      body: JSON.stringify(body) });
    skel.remove();
    if(r.status === 401){ bubble('Отказ в доступе: неверный токен оператора.', 'sys'); showGate(); return null; }
    return await r.json();
  } catch(e){ skel.remove(); bubble('Сеть недоступна: ' + e, 'sys'); return null; }
}

function autoGrow(){ inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 120) + 'px'; }
inp.addEventListener('input', autoGrow);

async function send(){
  const text = inp.value.trim(); if(!text) return;
  inp.value = ''; autoGrow(); paletteClose();
  // На поверхности агента то же поле ввода это свободная инструкция оператора для агентного
  // цикла (POST /agent/run), а не диалог с панелью. В ручном режиме сюда же оператор вводит
  // номер выбранного варианта или свою команду на естественном языке.
  if(agentOpen){ agentRun(text); return; }
  bubble(text, 'op');
  const r = await api('/chat', { message: text }); render(r);
}
document.getElementById('send').onclick = send;

// --- Палитра команд (ADR-0038, раздел 4) ---
// Появляется при вводе «/» первым символом строки; каталог берётся с сервера
// (GET /commands, единый источник commands.py), дальнейший ввод фильтрует по подстроке
// в имени и описании. Стрелки перемещают выделение, Enter подставляет, Escape закрывает,
// на сенсорном экране строка нажимается пальцем.
const palette = document.getElementById('palette');
let palCatalog = null, palItems = [], palSel = 0;
async function loadCatalog(){
  if(palCatalog) return palCatalog;
  const d = await jget('/commands');
  palCatalog = (d && d.commands) || [];
  return palCatalog;
}
function paletteOpen(){ return !palette.classList.contains('hidden'); }
function paletteClose(){ palette.classList.add('hidden'); palette.innerHTML = ''; palItems = []; }
function palettePick(i){
  const cmd = palItems[i]; if(!cmd) return;
  inp.value = cmd.name + ' '; paletteClose(); inp.focus(); autoGrow();
}
function palettePaintSel(){
  palette.querySelectorAll('.pal-item').forEach((b, i) => {
    b.classList.toggle('sel', i === palSel);
    if(i === palSel) b.scrollIntoView({ block: 'nearest' });
  });
}
async function updatePalette(){
  const v = inp.value;
  if(!v.startsWith('/')){ paletteClose(); return; }
  const cat = await loadCatalog();
  if(!v.startsWith('/')){ paletteClose(); return; } // ввод мог измениться, пока грузился каталог
  const q = v.slice(1).toLowerCase();
  palItems = cat.filter((c) => (c.name + ' ' + c.summary).toLowerCase().includes(q));
  if(!palItems.length){ paletteClose(); return; }
  palSel = Math.min(palSel, palItems.length - 1);
  palette.innerHTML = '';
  palItems.forEach((c, i) => {
    const b = el('button', 'pal-item'); b.setAttribute('role', 'option'); b.type = 'button';
    b.appendChild(el('span', 'pn', c.name));
    b.appendChild(el('span', 'pd', c.summary || ''));
    if(c.confirm) b.appendChild(el('span', 'pc', 'подтверждение'));
    b.onclick = () => palettePick(i);
    palette.appendChild(b);
  });
  palette.classList.remove('hidden');
  palettePaintSel();
}
inp.addEventListener('input', updatePalette);
inp.addEventListener('keydown', (e) => {
  if(paletteOpen()){
    if(e.key === 'ArrowDown'){ e.preventDefault(); palSel = (palSel + 1) % palItems.length; palettePaintSel(); return; }
    if(e.key === 'ArrowUp'){ e.preventDefault(); palSel = (palSel - 1 + palItems.length) % palItems.length; palettePaintSel(); return; }
    if(e.key === 'Enter'){ e.preventDefault(); palettePick(palSel); return; }
    if(e.key === 'Escape'){ e.preventDefault(); paletteClose(); return; }
  }
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});

function updateBadge(n){

  else badge.classList.add('hidden');

function rel(iso){
  if(!iso) return '-'; const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if(s < 60) return 'только что'; if(s < 3600) return Math.floor(s / 60) + ' мин назад';
  if(s < 86400) return Math.floor(s / 3600) + ' ч назад'; return Math.floor(s / 86400) + ' дн назад';
}
async function jget(path){
  const r = await fetch(path, { headers: { 'authorization': 'Bearer ' + TOKEN } });
  if(r.status === 401){ showGate(); return null; } return r.json();
}
async function jpost(path, body){
  const r = await fetch(path, { method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': 'Bearer ' + TOKEN },
    body: JSON.stringify(body || {}) });
  if(r.status === 401){ showGate(); return null; } return r.json();
}

function incCard(g){
  const c = el('div', 'inc-card' + (g.unread ? ' unread' : ''));
  const top = el('div', 'inc-top');
  const m = SM[g.status] || { label: g.status || '-', cls: '' };
  const chip = el('span', 'chip ' + m.cls); chip.appendChild(el('i', 'dot')); chip.appendChild(el('span', null, m.label));
  top.appendChild(chip);
  // Номер группы инцидентов с кнопкой копирования.
  const idw = el('span', 'inc-id'); idw.appendChild(el('code', 'inc-code', g.id || '-'));
  const cp = el('button', 'inc-copy'); cp.innerHTML = ICON.copy;
  cp.title = 'Копировать номер'; cp.setAttribute('aria-label', 'Копировать номер инцидента');
  cp.onclick = (e) => { e.stopPropagation(); copyText(g.id || '', cp); };
  idw.appendChild(cp); top.appendChild(idw);
  // Бейдж жизненного цикла: сразу видно, занимался ли кто-то инцидентом.
  const lm = LC[g.lifecycle] || { label: g.lifecycle || 'новый', cls: '' };
  top.appendChild(el('span', 'lc ' + lm.cls, lm.label));
  top.appendChild(el('span', 'count', '×' + g.count));
  c.appendChild(top);
  c.appendChild(el('div', 'inc-title', g.title));
  let meta = 'последний: ' + rel(g.last_seen) + ' · первый: ' + rel(g.first_seen);
  if(g.reopened_from) meta += ' · переоткрыт после ' + g.reopened_from;
  c.appendChild(el('div', 'inc-meta', meta));
  // Отметка «кем решено»: агент или оператор и каким действием.
  if(LC_RESOLVED.includes(g.lifecycle) && g.resolved_by){
    const who = g.resolved_by === 'agent' ? 'агентом' : ('оператором «' + g.resolved_by + '»');
    c.appendChild(el('div', 'inc-resolved',
      'решено ' + who + (g.resolved_action ? ' · действие: ' + g.resolved_action : '')));
  } else if(g.lifecycle === 'acknowledged' && g.acked_by){
    c.appendChild(el('div', 'inc-resolved', 'в работе у оператора «' + g.acked_by + '»'));
  }
  const v = g.last_verdict || {};
  if(v.action || (v.evidence && v.evidence.length)){
    const det = document.createElement('details'); det.className = 'inc-more';
    det.appendChild(el('summary', null, 'Подробнее'));
    const body = el('div', 'inc-body');
    if(v.action){ body.appendChild(el('div', 'v-label', 'Рекомендация')); body.appendChild(el('div', 'v-text', v.action)); }
    if(v.evidence && v.evidence.length){
      body.appendChild(el('div', 'v-label', 'Свидетельства из логов'));
      v.evidence.forEach((e) => { const b = el('div', 'v-ev'); b.appendChild(el('span', 'src', e.source || ''));
        b.appendChild(el('span', 'snip', e.snippet || '')); body.appendChild(b); });
    }
    if(v.report){ body.appendChild(el('div', 'v-label', 'Отчёт')); body.appendChild(el('div', 'v-report', v.report)); }
    det.appendChild(body); c.appendChild(det);
  }
  // Решённая группа закрыта навсегда: повторение отпечатка откроет новую группу со
  // ссылкой на эту, поэтому кнопок действий у решённой карточки нет.
  if(!LC_RESOLVED.includes(g.lifecycle)){
    // Кнопка «В работу»: оператор берёт эскалацию на себя (acknowledged).
    if(g.lifecycle !== 'acknowledged'){
      const ackBtn = el('button', 'btn-ack', 'В работу');
      ackBtn.onclick = async () => {
        ackBtn.disabled = true;
        await jpost('/incidents/ack', { key: g.id });
        const nd = await jget('/incidents'); if(nd){ updateBadge(nd.unread); renderIncidents(nd); }
      };
      c.appendChild(ackBtn);
    }
    // Кнопка «Решить»: передаёт инцидент модели, она выбирает безопасное действие из узкого
    // каталога и панель его исполняет (клик и есть подтверждение).
    const solveBtn = el('button', 'btn-solve');
    solveBtn.innerHTML = ICON.wrench + '<span>Решить</span>';
    solveBtn.onclick = () => solveIncident(g, solveBtn);
    c.appendChild(solveBtn);
    // Кнопка «Разобрать» (ADR-0041): запускает агентный цикл над вердиктом инцидента
    // (расследование плюс ремонт) и показывает трейс шагов на поверхности агента, а не только
    // выбор из каталога solve. Опасное агент предложит на подтверждение.
    const digBtn = el('button', 'btn-ack'); digBtn.style.marginLeft = '8px';
    digBtn.textContent = 'Разобрать';
    digBtn.onclick = () => investigateIncident(g, digBtn);
    c.appendChild(digBtn);
  }
  return c;
}

async function solveIncident(g, btn){
  const html = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span>Решаю…</span>';
  const d = await jpost('/incidents/solve', { key: g.id });
  btn.disabled = false; btn.innerHTML = html;
  openChat();
  bubble('Инцидент ' + (g.id || '') + '. ' + ((d && d.message) || 'Не удалось выполнить.'), 'sys');
  const nd = await jget('/incidents'); if(nd){ updateBadge(nd.unread); if(incidentsOpen) renderIncidents(nd); }
}

// «Разобрать»: агентное расследование инцидента. Открываем поверхность агента и рисуем
// вернувшийся трейс шагов той же лентой, что и свободную инструкцию оператора.
async function investigateIncident(g, btn){
  const prev = btn.textContent; btn.disabled = true; btn.textContent = 'Разбираю…';
  const d = await jpost('/incidents/investigate', { key: g.id });
  btn.disabled = false; btn.textContent = prev;
  await openAgent();
  const empty = agFeed.querySelector('.ag-empty'); if(empty) empty.remove();
  const head = el('div', 'ag-step explain enter');
  head.appendChild(el('div', 'st-kind', 'разбор инцидента ' + (g.id || '')));
  if(d && d.trace && d.trace.instruction) head.appendChild(el('div', 'st-text', d.trace.instruction));
  agFeed.appendChild(head);
  const steps = (d && d.trace && d.trace.steps) || [];
  steps.forEach((s) => {
    const card = stepCard(s); card.classList.add('enter'); agFeed.appendChild(card);
    if(s.outcome === 'pending_confirm' && s.confirm_token && agentMode !== 'manual'){
      const wrap = el('div'); wrap.appendChild(agentConfirmCard(s)); agFeed.appendChild(wrap);
    }
  });
  if(agentMode === 'manual'){ const opts = agentOptions(steps); if(opts) agFeed.appendChild(opts); }
  agFeed.scrollTop = agFeed.scrollHeight;
  await refreshAgentState();
}
// Фильтр ленты по статусу жизненного цикла: все, требуют внимания, решённые.
let incFilter = 'all', lastIncData = null;
function passFilter(g){
  if(incFilter === 'resolved') return LC_RESOLVED.includes(g.lifecycle);
  if(incFilter === 'attention') return !LC_RESOLVED.includes(g.lifecycle);
  return true;
}

// Подпись дня для разделителя: Сегодня, Вчера, далее дата.
function dayLabel(day){
  if(!day) return '';
  const fmt = (t) => { const d = new Date(t); const p = (n) => String(n).padStart(2, '0');
    return d.getUTCFullYear() + '-' + p(d.getUTCMonth() + 1) + '-' + p(d.getUTCDate()); };
  const now = Date.now();
  if(day === fmt(now)) return 'Сегодня';
  if(day === fmt(now - 86400000)) return 'Вчера';
  return new Date(day + 'T00:00:00Z').toLocaleDateString('ru-RU',
    { day: 'numeric', month: 'long', timeZone: 'UTC' });
}
function renderIncidents(d){
  lastIncData = d;
  incList.innerHTML = '';
  const groups = ((d && d.groups) || []).filter(passFilter);
  if(!groups.length){
    const e = el('div', 'inc-empty'); e.appendChild(el('div', 'big', 'Инцидентов нет'));
    e.appendChild(el('div', null, incFilter === 'all'
      ? 'Панель опрашивает RCA в фоне и покажет здесь инциденты, сгруппированные по одинаковым.'
      : 'Под выбранный фильтр не попал ни один инцидент.'));
    incList.appendChild(e); return;
  }
  // Разделители по дням: свежие сверху (сервер уже сортирует по последнему появлению).
  let curDay = null;
  groups.forEach((g) => {
    if(g.day !== curDay){ curDay = g.day; incList.appendChild(el('div', 'inc-day', dayLabel(g.day))); }
    incList.appendChild(incCard(g));
  });
}

// Лента шагов рассуждения агента: рендерим шаги последовательно, каждый своей карточкой.
function stepCard(step){
  const kind = step.step || 'step';
  const c = el('div', 'ag-step ' + kind);
  const top = el('div', 'st-top');
  top.appendChild(el('span', 'st-kind', kind));
  if(step.node) top.appendChild(el('span', 'st-node', 'узел ' + step.node));
  else if(step.target) top.appendChild(el('span', 'st-node', step.target));
  const oc = step.outcome;
  if(oc){
    const map = { executed: ['выполнено', 'ok'], failed: ['неудача', 'bad'],
                  blocked: ['заблокировано гардом', 'bad'], pending_confirm: ['ждёт подтверждения', 'wait'],
                  proposed: ['предложено', 'wait'] };
    const m = map[oc] || [oc, ''];
    top.appendChild(el('span', 'st-outcome ' + m[1], m[0]));
  }
  c.appendChild(top);
  // Текстовые шаги (объяснение, итог, ошибка).
  if(kind === 'explain' && step.text){ c.appendChild(el('div', 'st-text', step.text)); }
  else if(kind === 'done' && step.summary){ c.appendChild(el('div', 'st-text', step.summary)); }
  else if(kind === 'error' && step.text){ c.appendChild(el('div', 'st-text', step.text)); }
  // Команда argv.
  if(step.argv && step.argv.length){ c.appendChild(el('div', 'st-cmd', step.argv.join(' '))); }
  if(step.why){ c.appendChild(el('div', 'st-why', step.why)); }
  if(step.class_ru){ c.appendChild(el('div', 'st-class', 'класс политики: ' + step.class_ru)); }
  else if(step.class){ c.appendChild(el('div', 'st-class', 'класс политики: ' + step.class)); }
  // Результат или вывод, обрезанный до разумного.
  const res = step.result;
  if(res != null){
    let out = '';
    if(typeof res === 'string') out = res;
    else if(res.error) out = 'ошибка: ' + res.error;
    else if(res.stdout != null || res.stderr != null){
      out = (res.stdout || '') + (res.stderr ? ('\n' + res.stderr) : '');
      if(res.exit_code != null) out = 'код возврата ' + res.exit_code + '\n' + out;
    } else if(res.data != null) out = (typeof res.data === 'string') ? res.data : JSON.stringify(res.data, null, 1);
    else if(res.detail != null) out = String(res.detail);
    else out = JSON.stringify(res, null, 1);
    out = (out || '').slice(0, 2000);
    if(out.trim()) c.appendChild(el('div', 'st-out', out));
  }
  if(step.message){ c.appendChild(el('div', 'st-why', step.message)); }
  return c;
}

// Карточка подтверждения для отложенной finance или destructive команды: усиленный ввод для
// destructive. По подтверждению POST /agent/confirm {token}.
function agentConfirmCard(step){
  const c = el('div', 'card confirm');
  const t = el('div', 't'); const ic = document.createElement('span'); ic.innerHTML = ICON.warn;
  t.appendChild(ic.firstChild); t.appendChild(el('span', null, 'Подтверждение операции агента'));
  c.appendChild(t);
  c.appendChild(el('div', null, (step.class_ru || step.class || '') + '.'));
  if(step.argv) c.appendChild(el('div', 'st-cmd', step.argv.join(' ')));
  const destructive = step.class === 'destructive';
  const need = destructive ? 'ПОДТВЕРЖДАЮ' : '';
  c.appendChild(el('div', 'hint', destructive
    ? 'Необратимое действие. Введите контрольное слово ПОДТВЕРЖДАЮ, чтобы разрешить исполнение.'
    : 'Подтвердите исполнение отложенной операции.'));
  const btns = el('div', 'cbtns');
  const ok = el('button', 'btn primary', 'Подтвердить'); ok.disabled = !!need;
  const no = el('button', 'btn ghost', 'Отмена');
  let word = null;
  if(need){
    word = el('input'); word.placeholder = need; word.setAttribute('autocomplete', 'off');
    word.oninput = () => { ok.disabled = word.value.trim() !== need; };
    c.appendChild(word);
  }
  ok.onclick = async () => {
    ok.disabled = true; no.disabled = true;
    const d = await jpost('/agent/confirm', { token: step.confirm_token });
    c.classList.remove('confirm');
    c.innerHTML = '';
    c.appendChild(el('div', 'st-text', (d && d.message) || 'Готово.'));
    if(d && d.step) c.appendChild(stepCard(d.step));
    await refreshAgentState();
  };
  no.onclick = () => { c.innerHTML = ''; c.appendChild(el('div', 'st-text', 'Операция отменена оператором.')); };
  btns.appendChild(ok); btns.appendChild(no); c.appendChild(btns);
  return c;
}

// Пронумерованные варианты решения в ручном режиме: агент предлагает мутации как варианты,
// оператор выбирает номер (шлётся продолжением в /agent/run) или вводит свою команду в поле.
function agentOptions(steps){
  const proposed = steps.filter((s) => s.outcome === 'proposed' || s.outcome === 'pending_confirm');
  if(!proposed.length) return null;
  const wrap = el('div', 'ag-options');
  wrap.appendChild(el('div', 'ag-label', 'Варианты решения (выберите номер или введите свою команду)'));
  proposed.forEach((s, i) => {
    const b = el('button', 'ag-opt'); b.type = 'button';
    b.appendChild(el('span', 'onum', String(i + 1)));
    const body = el('div', 'obody');
    body.appendChild(el('div', 'ocmd', (s.argv || []).join(' ')));
    body.appendChild(el('div', 'orisk', (s.class_ru || s.class || '') + (s.why ? '; ' + s.why : '')));
    b.appendChild(body);
    b.onclick = () => {
      // finance и destructive всегда идут через подтверждение (усиленное для destructive);
      // safe_write в ручном режиме оператор подтверждает тем же токеном.
      const card = agentConfirmCard(s);
      const row = el('div'); row.appendChild(card); agFeed.appendChild(row);
      agFeed.scrollTop = agFeed.scrollHeight;
    };
    wrap.appendChild(b);
  });
  return wrap;
}

// Запуск агентного цикла над инструкцией оператора и отрисовка трейса лентой.
let agentBusy = false;
async function agentRun(text){
  if(agentBusy) return; agentBusy = true;
  // Убираем заглушку пустого состояния при первом запуске.
  const empty = agFeed.querySelector('.ag-empty'); if(empty) empty.remove();
  // Эхо инструкции оператора.
  const opRow = el('div', 'ag-step explain enter');
  opRow.appendChild(el('div', 'st-kind', 'инструкция оператора'));
  opRow.appendChild(el('div', 'st-text', text));
  agFeed.appendChild(opRow); agFeed.scrollTop = agFeed.scrollHeight;
  // Скелетон ожидания.
  const skel = el('div', 'row sys'); skel.appendChild(el('div', 'skel')); agFeed.appendChild(skel);
  agFeed.scrollTop = agFeed.scrollHeight;
  const d = await jpost('/agent/run', { message: text });
  skel.remove();
  agentBusy = false;
  if(!d){ return; }
  const steps = d.steps || [];
  if(!d.model){
    const note = el('div', 'ag-step explain');
    note.appendChild(el('div', 'st-kind', 'без модели'));
    note.appendChild(el('div', 'st-text', d.message || 'Модель недоступна: исполнена одна команда.'));
    agFeed.appendChild(note);
  }
  steps.forEach((s) => {
    const card = stepCard(s);
    card.classList.add('enter');
    agFeed.appendChild(card);
    // finance и destructive: сразу карточка подтверждения под шагом (в auto-режиме).
    if((s.outcome === 'pending_confirm') && s.confirm_token && (agentMode !== 'manual')){
      const wrap = el('div'); wrap.appendChild(agentConfirmCard(s)); agFeed.appendChild(wrap);
    }
  });
  // Ручной режим: показать пронумерованные варианты решения из предложенных шагов.
  if(agentMode === 'manual'){
    const opts = agentOptions(steps);
    if(opts) agFeed.appendChild(opts);
  }
  agFeed.scrollTop = agFeed.scrollHeight;
  await refreshAgentState();
  if(speakOn){ const done = steps.filter((s) => s.step === 'done'); if(done.length) speak(done[done.length - 1].summary); }
}

// Автозапуск опроса, если вход уже выполнен (после всех определений выше, не в TDZ).
if(TOKEN) startPolling();

// --- PWA ---
if('serviceWorker' in navigator){ window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {})); }
</script>
