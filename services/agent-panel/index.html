<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>kube-sentinel · операторская консоль</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg">
<style>
:root{
  --bg:#0b0f14; --panel:#12181f; --panel2:#171f28; --panel3:#1c2530;
  --border:#232d38; --border2:#2d3a48;
  --text:#d6dee8; --muted:#8592a3; --dim:#5b6875;
  --blue:#4c8dff; --green:#3fb950; --amber:#d6a01a; --red:#f0603a; --violet:#a371f7;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:9px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#2b3742;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

#gate{position:fixed;inset:0;background:radial-gradient(1200px 600px at 50% -10%,#132030,#0b0f14);
  display:flex;align-items:center;justify-content:center;z-index:50}
#gate .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:30px 28px;width:min(400px,92vw);box-shadow:0 24px 60px #0009}
#gate h1{font-size:19px;margin:0 0 4px;letter-spacing:.3px}
#gate p{color:var(--muted);margin:0 0 20px;font-size:13px}
#gate label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
#gate input{width:100%;background:var(--panel3);border:1px solid var(--border2);color:var(--text);
  border-radius:9px;padding:11px 13px;font-family:var(--mono);font-size:14px;outline:none}
#gate input:focus{border-color:var(--blue)}
#gate button{margin-top:16px;width:100%;background:var(--blue);color:#04101f;border:0;
  border-radius:9px;padding:11px;font-weight:650;font-size:14px}
#gate .err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}
.brandmark{display:inline-flex;align-items:center;gap:9px;margin-bottom:14px}
.brandmark .dot{width:11px;height:11px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 4px #3fb95022}

#app{display:none;grid-template-rows:auto 1fr;height:100%}
header{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);
  border-bottom:1px solid var(--border);flex-wrap:wrap}
header .brand{display:flex;align-items:center;gap:9px;font-weight:650;letter-spacing:.3px}
header .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--green)}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel3);
  border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--muted)}
.chip b{color:var(--text);font-weight:600}
header .spacer{flex:1}
select{background:var(--panel3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:6px 10px;font-size:12.5px;outline:none}
select:focus{border-color:var(--blue)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);transition:background .3s}
.pulse.bad{background:var(--red)}
header .ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);
  border-radius:8px;padding:6px 11px;font-size:12.5px}
header .ghost:hover{color:var(--text)}

main{display:grid;grid-template-columns:1.35fr .9fr;gap:12px;padding:12px;min-height:0;overflow:hidden}
@media(max-width:940px){main{grid-template-columns:1fr;overflow:auto}}
.col{display:flex;flex-direction:column;gap:12px;min-height:0}
.left{overflow:hidden}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  display:flex;flex-direction:column;min-height:0}
.panel>.head{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--border)}
.panel>.head h2{font-size:13px;margin:0;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
.panel>.head .count{font-size:12px;color:var(--dim);font-family:var(--mono)}
.panel>.head .spacer{flex:1}
.panel>.body{overflow:auto;padding:10px;min-height:0}
.left .incidents{flex:1 1 58%}
.left .cluster{flex:1 1 42%}

.inc{border:1px solid var(--border);border-left:3px solid var(--dim);border-radius:8px;
  padding:11px 12px;margin-bottom:9px;background:var(--panel2)}
.inc.high{border-left-color:var(--red)}
.inc.uncertain{border-left-color:var(--amber)}
.inc.healthy,.inc.low{border-left-color:var(--green)}
.inc .top{display:flex;align-items:flex-start;gap:9px}
.inc .title{font-weight:600;font-size:13.5px;flex:1}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 7px;border-radius:5px;white-space:nowrap}
.badge.high{background:#f0603a22;color:#ff8a6a}
.badge.uncertain{background:#d6a01a22;color:#f0c454}
.badge.low,.badge.healthy{background:#3fb95022;color:#6cd67f}
.inc .root{color:var(--muted);font-size:12.5px;margin:7px 0 0}
.inc .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.tag{font-family:var(--mono);font-size:11px;background:var(--panel3);border:1px solid var(--border2);
  color:var(--muted);border-radius:5px;padding:1px 7px}
.inc .when{color:var(--dim);font-size:11px;font-family:var(--mono);margin-left:auto}
.inc .acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.btn{background:var(--panel3);border:1px solid var(--border2);color:var(--text);border-radius:7px;
  padding:5px 11px;font-size:12px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--blue);color:#fff}
.btn.warn:hover{border-color:var(--amber)}
.btn:disabled{opacity:.5;cursor:default}

.krow{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;
  padding:7px 6px;border-bottom:1px solid var(--border);font-size:12.5px}
.krow:last-child{border-bottom:0}
.krow .nm{font-family:var(--mono);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap}
.st.ok{background:#3fb95022;color:#6cd67f}
.st.warn{background:#d6a01a22;color:#f0c454}
.st.err{background:#f0603a22;color:#ff8a6a}
.rst{font-family:var(--mono);font-size:11.5px;color:var(--dim);white-space:nowrap}
.rst.hot{color:#ff8a6a}
.subhead{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;
  margin:12px 4px 6px;font-weight:600}
.drow{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;
  padding:6px;border-bottom:1px solid var(--border);font-size:12.5px}
.drow .nm{font-family:var(--mono);font-size:12px}
.rep{font-family:var(--mono);font-size:12px}
.rep.ok{color:#6cd67f}.rep.bad{color:#ff8a6a}

.assistant{height:100%}
.chatwrap{flex:1;display:flex;flex-direction:column;min-height:0}
.msgs{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:92%;padding:10px 13px;border-radius:12px;font-size:13.5px;white-space:pre-wrap;
  word-wrap:break-word}
.msg.u{align-self:flex-end;background:var(--blue);color:#04101f;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:var(--panel3);border:1px solid var(--border);
  border-bottom-left-radius:4px}
.msg.sys{align-self:center;color:var(--dim);font-size:12px;background:transparent}
.typing{align-self:flex-start;color:var(--muted);font-size:13px}
.chips{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 10px}
.qchip{background:var(--panel3);border:1px solid var(--border2);color:var(--muted);border-radius:16px;
  padding:5px 11px;font-size:11.5px}
.qchip:hover{color:var(--text);border-color:var(--blue)}
.composer{display:flex;gap:9px;padding:12px 14px;border-top:1px solid var(--border)}
.composer textarea{flex:1;resize:none;background:var(--panel3);border:1px solid var(--border2);
  color:var(--text);border-radius:10px;padding:10px 12px;font-family:var(--sans);font-size:13.5px;
  outline:none;max-height:120px;min-height:42px}
.composer textarea:focus{border-color:var(--blue)}
.composer .send{background:var(--blue);color:#04101f;border:0;border-radius:10px;padding:0 16px;
  font-weight:650;font-size:16px}
.composer .send:disabled{opacity:.5}

#drawer{position:fixed;top:0;right:0;height:100%;width:min(720px,94vw);background:var(--panel);
  border-left:1px solid var(--border);transform:translateX(100%);transition:transform .22s ease;
  z-index:40;display:flex;flex-direction:column;box-shadow:-20px 0 50px #0007}
#drawer.open{transform:translateX(0)}
#drawer .dhead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
#drawer .dhead .nm{font-family:var(--mono);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis}
#drawer pre{flex:1;overflow:auto;margin:0;padding:14px 16px;font-family:var(--mono);font-size:12px;
  line-height:1.55;color:#c6d2de;white-space:pre-wrap;word-break:break-word}
.xbtn{background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:7px;
  width:30px;height:30px;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.xbtn:hover{color:var(--text)}

#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:60;
  display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--panel3);border:1px solid var(--border2);border-radius:9px;padding:9px 15px;
  font-size:13px;box-shadow:0 10px 30px #0008;animation:tin .2s ease}
.toast.ok{border-color:#2f6b3a}.toast.err{border-color:#7a352a}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.empty{color:var(--dim);text-align:center;padding:26px 10px;font-size:13px}
.spin{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--blue);
  border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-2px;margin-left:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <div class="brandmark"><span class="dot"></span><b>kube-sentinel</b></div>
    <h1>Операторская консоль</h1>
    <p>Автономный SRE-агент, разбор первопричин и управление кластером.</p>
    <label for="tok">Токен оператора</label>
    <input id="tok" type="password" autocomplete="off" spellcheck="false" placeholder="введите токен">
    <button id="enter">Войти</button>
    <div class="err" id="gerr"></div>
  </div>
</div>

<div id="app">
  <header>
    <span class="brand"><span class="dot"></span>kube-sentinel</span>
    <span class="chip">ns&nbsp;<b id="hns">—</b></span>
    <label class="chip" style="gap:8px">автономия
      <select id="mode" title="уровень автономии агента">
        <option value="observe">observe</option>
        <option value="safe_repair">safe_repair</option>
        <option value="full">full</option>
      </select>
    </label>
    <span class="spacer"></span>
    <span class="chip" id="slochip" title="цели уровня обслуживания и бюджет ошибок">SLO —</span>
    <span class="chip" id="llmchip" title="наблюдаемость инференса модели">инференс —</span>
    <span class="chip"><span class="pulse" id="pulse"></span><span id="clock">—</span></span>
    <button class="ghost" id="logout">выйти</button>
  </header>

  <main>
    <div class="col left">
      <section class="panel incidents">
        <div class="head"><h2>Инциденты</h2><span class="count" id="inccount"></span>
          <span class="spacer"></span>
          <button class="btn" id="purge" title="убрать шумовые">очистить шум</button>
        </div>
        <div class="body" id="inclist"><div class="empty">загрузка…</div></div>
      </section>

      <section class="panel cluster">
        <div class="head"><h2>Кластер</h2><span class="count" id="clcount"></span></div>
        <div class="body" id="clbody"><div class="empty">загрузка…</div></div>
      </section>
    </div>

    <div class="col">
      <section class="panel assistant">
        <div class="head"><h2>Ассистент</h2><span class="count" id="model">gemma-4-12b</span></div>
        <div class="chatwrap">
          <div class="msgs" id="msgs"></div>
          <div class="chips" id="chips"></div>
          <div class="composer">
            <textarea id="inp" rows="1" placeholder="Спросите ассистента… (Enter — отправить)"></textarea>
            <button class="send" id="send">➤</button>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<div id="drawer">
  <div class="dhead"><span class="nm" id="dname">логи</span>
    <button class="btn" id="drefresh">обновить</button>
    <button class="xbtn" id="dclose">×</button></div>
  <pre id="dlogs"></pre>
</div>

<div id="toasts"></div>

<script>
const $=s=>document.querySelector(s);
let TOKEN=localStorage.getItem('sentinel_token')||'';
const history=[];

async function api(path,opts){
  opts=opts||{};
  const h=opts.headers||{};
  h['authorization']='Bearer '+TOKEN;
  if(opts.body){h['content-type']='application/json';}
  const r=await fetch(path,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  if(r.status===401){logout();throw new Error('unauthorized');}
  setPulse(r.ok);
  return r.json();
}
function setPulse(ok){const p=$('#pulse');if(p)p.classList.toggle('bad',!ok);}

$('#enter').onclick=tryLogin;
$('#tok').onkeydown=e=>{if(e.key==='Enter')tryLogin();};
async function tryLogin(){
  const t=$('#tok').value.trim();if(!t){return;}
  TOKEN=t;
  try{
    const r=await fetch('/agent/state',{headers:{'authorization':'Bearer '+t}});
    if(r.status===401){$('#gerr').textContent='Неверный токен';return;}
    localStorage.setItem('sentinel_token',t);boot();
  }catch(e){$('#gerr').textContent='Панель недоступна';}
}
function logout(){localStorage.removeItem('sentinel_token');TOKEN='';location.reload();}
$('#logout').onclick=logout;

function boot(){
  $('#gate').style.display='none';$('#app').style.display='grid';
  tick();refreshAll();setInterval(refreshAll,5000);setInterval(tick,1000);
  greet();renderChips();$('#inp').focus();
}
function tick(){$('#clock').textContent=new Date().toLocaleTimeString('ru-RU');}

async function refreshAll(){try{await Promise.all([loadIncidents(),loadCluster(),loadState(),loadSlo(),loadLlm()]);}catch(e){}}
async function loadSlo(){try{const s=await api('/slo');const c=$('#slochip');
  if(!s||!s.enabled){c.textContent='SLO выкл';c.style.color='';return;}
  const col={ok:'#6cd67f',at_risk:'#f0c454',critical:'#ff8a6a'}[s.severity]||'';
  c.textContent='SLO '+s.severity+' · burn '+s.burn_rate+'×';c.style.color=col;}catch(e){}}
async function loadLlm(){try{const m=await api('/llm/metrics');const c=$('#llmchip');
  if(!m||!m.calls){c.textContent='инференс —';return;}
  c.textContent='инференс p95 '+Math.round(m.latency_p95_ms)+'мс · ошиб '+Math.round(m.error_rate*100)+'%';
  c.style.color=m.error_rate>0.1?'#ff8a6a':'';}catch(e){}}
async function loadState(){try{const s=await api('/agent/state');$('#mode').value=s.mode||s.autonomy||'observe';}catch(e){}}
$('#mode').onchange=async()=>{
  try{await api('/agent/mode',{method:'POST',body:{mode:$('#mode').value}});toast('автономия: '+$('#mode').value,'ok');}
  catch(e){toast('не удалось сменить режим','err');}
};

const BAND=b=>({high:'high',uncertain:'uncertain',low:'low',healthy:'healthy'}[b]||'low');
function when(ts){if(!ts)return'';const s=(Date.now()-new Date(ts))/1000;
  if(s<60)return Math.round(s)+'с назад';if(s<3600)return Math.round(s/60)+'м назад';return Math.round(s/3600)+'ч назад';}
async function loadIncidents(){
  const d=await api('/incidents');const box=$('#inclist');const gs=d.groups||[];
  $('#inccount').textContent=gs.length?(gs.length+' активн., '+(d.unread||0)+' непрочит.'):'';
  box.textContent='';
  if(!gs.length){const e=document.createElement('div');e.className='empty';
    e.textContent='Инцидентов нет. Кластер спокоен.';box.appendChild(e);return;}
  for(const g of gs){box.appendChild(incCard(g));}
}
function incCard(g){
  const band=BAND(g.band);const el=document.createElement('div');el.className='inc '+band;
  const top=document.createElement('div');top.className='top';
  const t=document.createElement('div');t.className='title';t.textContent=g.title||'инцидент';
  const b=document.createElement('span');b.className='badge '+band;b.textContent=g.band||g.status||'';
  top.appendChild(t);top.appendChild(b);el.appendChild(top);
  const v=g.last_verdict||{};
  if(v.root_cause){const rc=document.createElement('div');rc.className='root';rc.textContent=v.root_cause;el.appendChild(rc);}
  const meta=document.createElement('div');meta.className='meta';
  for(const dt of (g.detectors||[])){const x=document.createElement('span');x.className='tag';x.textContent=dt;meta.appendChild(x);}
  const cnt=document.createElement('span');cnt.className='tag';cnt.textContent='×'+(g.count||1);meta.appendChild(cnt);
  const w=document.createElement('span');w.className='when';w.textContent=when(g.last_seen);meta.appendChild(w);
  el.appendChild(meta);
  const acts=document.createElement('div');acts.className='acts';
  const pod=(v.params||{}).pod;
  if(pod){acts.appendChild(btn('Логи',()=>showPodLogs(pod)));}
  const ab=btn('Спросить ассистента',()=>askAbout(g));ab.classList.add('warn');acts.appendChild(ab);
  el.appendChild(acts);return el;
}
function btn(label,fn,cls){const b=document.createElement('button');b.className='btn'+(cls?' '+cls:'');
  b.textContent=label;b.onclick=fn;return b;}
$('#purge').onclick=async()=>{try{const r=await api('/incidents/purge-noise',{method:'POST'});
  toast('убрано шумовых: '+(r.purged||0),'ok');loadIncidents();}catch(e){toast('ошибка','err');}};

function podStatus(p){
  if(p.waiting_reason)return['err',p.waiting_reason];
  if(p.oom_killed)return['err','OOMKilled'];
  if(p.phase==='Running')return['ok','Running'];
  if(p.phase==='Succeeded')return['ok','Succeeded'];
  if(p.phase==='Pending')return['warn','Pending'];
  return['warn',p.phase||'—'];
}
async function loadCluster(){
  const d=await api('/overview');$('#hns').textContent=d.namespace||'—';
  const pods=d.pods||[],deps=d.deployments||[];
  const bad=pods.filter(p=>podStatus(p)[0]!=='ok').length;
  $('#clcount').textContent=pods.length+' подов'+(bad?(', '+bad+' с проблемой'):'');
  const box=$('#clbody');box.textContent='';
  for(const p of pods){
    const st=podStatus(p);const row=document.createElement('div');row.className='krow';
    const nm=document.createElement('div');nm.className='nm';nm.textContent=p.name;nm.title=p.name;
    const s=document.createElement('span');s.className='st '+st[0];s.textContent=st[1];
    const rs=document.createElement('span');rs.className='rst'+(p.restarts?' hot':'');rs.textContent='↻'+p.restarts;
    const lg=btn('логи',()=>showPodLogs(p.name));lg.style.padding='3px 9px';lg.style.fontSize='11px';
    row.appendChild(nm);row.appendChild(s);row.appendChild(rs);row.appendChild(lg);box.appendChild(row);
  }
  if(deps.length){
    const sh=document.createElement('div');sh.className='subhead';sh.textContent='Деплойменты';box.appendChild(sh);
    for(const dp of deps){
      const row=document.createElement('div');row.className='drow';
      const nm=document.createElement('div');nm.className='nm';nm.textContent=dp.name;
      const ok=dp.desired>0&&dp.ready>=dp.desired;
      const rep=document.createElement('span');rep.className='rep '+(ok?'ok':'bad');rep.textContent=dp.ready+'/'+dp.desired;
      const rb=btn('перезапуск',()=>restartDep(dp.name),'warn');rb.style.padding='3px 9px';rb.style.fontSize='11px';
      row.appendChild(nm);row.appendChild(rep);row.appendChild(rb);box.appendChild(row);
    }
  }
}
async function restartDep(name){
  toast('перезапуск '+name+'…');
  try{const r=await api('/action/restart',{method:'POST',body:{name}});
    toast(r.ok?('перезапущен '+name):('отказ: '+(r.detail||'')),r.ok?'ok':'err');setTimeout(loadCluster,1200);}
  catch(e){toast('ошибка перезапуска','err');}
}

let curPod=null;
async function showPodLogs(pod){
  curPod=pod;$('#dname').textContent=pod;$('#dlogs').textContent='загрузка…';$('#drawer').classList.add('open');
  try{const r=await api('/pod/logs',{method:'POST',body:{pod,lines:200}});
    $('#dlogs').textContent=r.ok?(r.logs||'(пусто)'):('— '+(r.message||'нет логов'));}
  catch(e){$('#dlogs').textContent='ошибка получения логов';}
}
$('#dclose').onclick=()=>$('#drawer').classList.remove('open');
$('#drefresh').onclick=()=>{if(curPod)showPodLogs(curPod);};

function addMsg(role,text){const m=document.createElement('div');m.className='msg '+role;
  m.textContent=text;$('#msgs').appendChild(m);$('#msgs').scrollTop=$('#msgs').scrollHeight;return m;}
function greet(){addMsg('sys','Ассистент на связи. Модель gemma-4-12b, локально на GPU. Видит инциденты и состояние подов.');}
const QUICK=['Что сейчас сломано в кластере?','Разбери главный инцидент и дай план',
  'Как чинить ImagePullBackOff?','Почему под уходит в OOMKilled?'];
function renderChips(){const c=$('#chips');c.textContent='';for(const q of QUICK){
  const b=document.createElement('button');b.className='qchip';b.textContent=q;
  b.onclick=()=>{$('#inp').value=q;sendMsg();};c.appendChild(b);}}
function askAbout(g){$('#inp').value='Разбери инцидент: '+(g.title||'')+'. '+((g.last_verdict||{}).root_cause||'')+' Дай план устранения.';sendMsg();}
let busy=false;
async function sendMsg(){
  const inp=$('#inp');const text=inp.value.trim();if(!text||busy)return;
  inp.value='';inp.style.height='42px';addMsg('u',text);history.push({role:'user',content:text});
  busy=true;$('#send').disabled=true;
  const tw=document.createElement('div');tw.className='typing';tw.textContent='ассистент думает';
  const sp=document.createElement('span');sp.className='spin';tw.appendChild(sp);
  $('#msgs').appendChild(tw);$('#msgs').scrollTop=$('#msgs').scrollHeight;
  try{const r=await api('/ask',{method:'POST',body:{message:text,history:history.slice(0,-1)}});
    tw.remove();const ans=r.answer||'(нет ответа)';addMsg('a',ans);history.push({role:'assistant',content:ans});}
  catch(e){tw.remove();addMsg('a','ошибка обращения к ассистенту');}
  finally{busy=false;$('#send').disabled=false;inp.focus();}
}
$('#send').onclick=sendMsg;
$('#inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
$('#inp').addEventListener('input',e=>{e.target.style.height='42px';e.target.style.height=Math.min(120,e.target.scrollHeight)+'px';});

function toast(text,kind){const t=document.createElement('div');t.className='toast'+(kind?' '+kind:'');
  t.textContent=text;$('#toasts').appendChild(t);setTimeout(()=>t.remove(),3200);}

if(TOKEN){fetch('/agent/state',{headers:{'authorization':'Bearer '+TOKEN}}).then(r=>{
  if(r.ok)boot();else localStorage.removeItem('sentinel_token');}).catch(()=>{});}
$('#tok').focus();
</script>
