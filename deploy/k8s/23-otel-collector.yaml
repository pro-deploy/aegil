# Сборщик OpenTelemetry. Единая точка приёма трасс по OTLP от сервисов приложения,
# пакетирует и пересылает в Tempo. Отдельный шов оставлен под будущее семплирование и
# обработку. Приложения шлют трассы на otel-collector:4317 (gRPC) / 4318 (HTTP).
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: aegil
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 200
        spike_limit_mib: 50
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
    service:
      extensions: [health_check]
      telemetry:
        metrics:
          level: none
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: aegil
spec:
  selector: {app: otel-collector}
  ports:
    - {name: otlp-grpc, port: 4317, targetPort: 4317}
    - {name: otlp-http, port: 4318, targetPort: 4318}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: aegil
spec:
  replicas: 1
  selector: {matchLabels: {app: otel-collector}}
  template:
    metadata:
      labels: {app: otel-collector}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.104.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - {containerPort: 4317}
            - {containerPort: 4318}
            - {containerPort: 13133, name: health}
          readinessProbe:
            httpGet: {path: /, port: 13133}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /, port: 13133}
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - {name: config, mountPath: /etc/otel}
          resources:
            requests: {cpu: "100m", memory: 128Mi}
            limits: {memory: 256Mi}
      volumes:
        - name: config
          configMap: {name: otel-collector-config}
