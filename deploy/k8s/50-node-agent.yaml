# Привилегированный узловой агент (node-agent) продукта aegil.
# DaemonSet поднимает по одному поду на каждом узле кластера. Под входит в пространство имён хоста
# через nsenter (см. securityContext ниже) и даёт панели агента возможность исполнять команды
# эксплуатации на самих узлах (чистка диска, prune образов docker и containerd, df, top, снятие
# процесса, systemctl). Это god-mode-поверхность по отношению к узлу, поэтому доступ к ней закрыт
# сразу несколькими рамками: общий секрет проверяется за постоянное время; порт узла НЕ публикуется
# (нет hostPort и hostNetwork), панель ходит только по адресу пода через Service; сетевая политика
# NetworkPolicy пропускает входящие на порт агента ТОЛЬКО от пода панели по её метке.
#
# ПЕРЕД ПРИМЕНЕНИЕМ создать секрет с общим токеном доступа в пространстве имён продукта. Тот же токен
# обязателен и панели, чтобы она предъявляла его в заголовке X-NodeAgent-Token каждого запроса
# (иначе /run отвечает 401 и ничего не исполняет):
#   kubectl -n aegil create secret generic nodeagent-secrets \
#     --from-literal=AEGIL_NODEAGENT_TOKEN=$(openssl rand -hex 24)
# Тот же токен положить в секрет панели под ключом AEGIL_NODEAGENT_TOKEN.
#
# Селектор узлов и допуски (tolerations) параметризованы плейсхолдерами и подставляются под
# конкретный кластер при установке (например через Helm). По умолчанию DaemonSet встаёт на все
# рабочие узлы; при необходимости покрыть узлы под taint-ами (в том числе control-plane) владелец
# задаёт нужные допуски явно, а не разрешает все taint-ы без разбора.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: aegil
  labels:
    app.kubernetes.io/name: node-agent
    app.kubernetes.io/part-of: aegil
spec:
  selector: {matchLabels: {app: node-agent}}
  template:
    metadata:
      labels:
        app: node-agent
        app.kubernetes.io/name: node-agent
        app.kubernetes.io/part-of: aegil
    spec:
      # Токен служебной учётной записи не монтируется: привилегированному поду с узловым доступом не
      # нужен токен default-SA, а его наличие лишь расширяет поверхность (кража токена из-под root).
      automountServiceAccountToken: false
      # hostPID даёт видимость процессов хоста, включая PID 1. Она необходима, чтобы nsenter -t 1
      # вошёл в пространства имён хоста через /proc/1/ns/*. hostNetwork НЕ включаем: под получает
      # обычный адрес из pod-CIDR, маршрутизируемый между узлами, а порт узла не занимается.
      hostPID: true
      # ПЛЕЙСХОЛДЕР селектора узлов: подставляется под конкретный кластер при установке. По умолчанию
      # без ограничений (DaemonSet встаёт на все рабочие узлы). Зашитых меток исходного кластера нет.
      # nodeSelector: {}
      # ПЛЕЙСХОЛДЕР допусков: по умолчанию пусто (только рабочие узлы). Чтобы покрыть узлы под taint,
      # владелец добавляет конкретные допуски явно, а не оператор Exists ко всем taint-ам подряд.
      # tolerations: []
      containers:
        - name: node-agent
          image: REGISTRY_PLACEHOLDER/aegil/node-agent:VERSION_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          securityContext:
            # Полного privileged: true намеренно избегаем. Для входа через nsenter в пространства
            # имён mount, uts, ipc и net процесса PID 1 достаточно hostPID: true плюс капабилити
            # SYS_ADMIN (операция setns над этими пространствами), а SYS_PTRACE нужен для операций
            # над процессами хоста (снятие зависшего процесса, чтение /proc чужих процессов).
            # Файловую систему контейнера при этом оставляем только для чтения, эскалацию привилегий
            # запрещаем, все прочие капабилити сбрасываем. Если для конкретной операции строго
            # понадобится полный privileged, это обосновывается отдельно и включается точечно.
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN", "SYS_PTRACE"]
          # Порт узла НЕ публикуется: только containerPort, доступный по адресу пода через Service.
          # Публикация hostPort вывела бы god-mode-эндпоинт на все интерфейсы узла, включая
          # локальную сеть и управляющий узел, что недопустимо.
          ports: [{containerPort: 9110, name: http}]
          env:
            # Имя узла через downward API: возвращается в ответах и попадает в логи и аудит.
            - name: AEGIL_NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            # Общий секрет доступа: без него /run fail-closed отклоняет все запросы.
            - name: AEGIL_NODEAGENT_TOKEN
              valueFrom: {secretKeyRef: {name: nodeagent-secrets, key: AEGIL_NODEAGENT_TOKEN}}
            - {name: AEGIL_NODEAGENT_PORT, value: "9110"}
          readinessProbe:
            httpGet: {path: /health, port: 9110}
            initialDelaySeconds: 5
            periodSeconds: 15
          # Ресурсы скромные: сервис почти всё время простаивает и лишь изредка исполняет команды.
          resources:
            requests: {cpu: "10m", memory: 32Mi}
            limits: {memory: 96Mi}
---
# Внутрикластерный Service для доступа панели к node-agent по адресу пода. Тип ClusterIP, наружу
# ничего не публикуется. Панель обращается к конкретному поду узла (например через endpoints этого
# Service), порт узла при этом не занят.
apiVersion: v1
kind: Service
metadata:
  name: node-agent
  namespace: aegil
  labels:
    app.kubernetes.io/name: node-agent
    app.kubernetes.io/part-of: aegil
spec:
  clusterIP: None
  selector: {app: node-agent}
  ports:
    - {name: http, port: 9110, targetPort: 9110}
---
# Сетевая политика: входящий трафик на порт node-agent разрешён ТОЛЬКО от пода панели (по метке
# app: agent-panel в том же пространстве имён), больше ни от кого. Всё прочее отбрасывается, поэтому
# god-mode-эндпоинт недостижим ни из локальной сети, ни от произвольного пода кластера. Политика
# требует сетевого плагина с поддержкой NetworkPolicy; при его отсутствии полагаемся на секрет и
# отсутствие публикации порта, а сетевую политику дублируем средствами плагина.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: node-agent-allow-panel
  namespace: aegil
  labels:
    app.kubernetes.io/name: node-agent
    app.kubernetes.io/part-of: aegil
spec:
  podSelector:
    matchLabels: {app: node-agent}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels: {app: agent-panel}
      ports:
        - {protocol: TCP, port: 9110}
