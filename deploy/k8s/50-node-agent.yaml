# Привилегированный node-agent (ADR-0041, спецификация agent-panel-agentic-devops, раздел 2).
# DaemonSet поднимает по одному поду на КАЖДОМ узле кластера. Под запущен привилегированным и с
# hostPID, входит в пространство имён хоста через nsenter и даёт панели agent-panel возможность
# исполнять произвольные команды на самих узлах (чистка диска, prune docker и containerd, df, top,
# kill процесса, systemctl). Это god-mode-поверхность по отношению к узлу, поэтому она закрыта
# общим секретом NODEAGENT_TOKEN, слушается только внутрикластерно и НЕ публикуется наружу: у неё
# нет Ingress и нет Service типа LoadBalancer.
#
# ПЕРЕД ПРИМЕНЕНИЕМ создать секрет с общим токеном доступа (тот же токен обязателен и панели):
#   kubectl -n krokki create secret generic nodeagent-secrets \
#     --from-literal=NODEAGENT_TOKEN=$(openssl rand -hex 24)
# Тот же самый токен положить в секрет панели agent-panel, чтобы она предъявляла его в каждом
# запросе к node-agent (иначе /run отвечает 401 и ничего не исполняет):
#   TOK=$(kubectl -n krokki get secret nodeagent-secrets -o jsonpath='{.data.NODEAGENT_TOKEN}' | base64 -d)
#   kubectl -n krokki patch secret agent-panel-secrets --type merge \
#     -p "{\"stringData\":{\"NODEAGENT_TOKEN\":\"$TOK\"}}"
# Образ собрать и опубликовать в Nexus как остальные (deploy/build.sh, группа control).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: sentinel
spec:
  selector: {matchLabels: {app: node-agent}}
  template:
    metadata:
      labels: {app: node-agent}
    spec:
      # hostNetwork сознательно НЕ включаем: иначе podIP равен адресу узла (у домашнего GPU-узла
      # это его LAN-адрес, не маршрутизируемый с облачного управляющего узла), и панель не смогла
      # бы дотянуться до node-agent на GPU-узле. Без hostNetwork под получает обычный podIP из
      # pod-CIDR, который flannel маршрутизирует между узлами по WireGuard, ровно как для asr, llm
      # и прочих ML-подов. На вход в пространства имён хоста это не влияет: hostPID даёт видимость
      # PID 1, а nsenter -t 1 входит в mount, uts, ipc и net хоста через /proc/1/ns/*.
      # hostPID: видимость процессов хоста, необходима для входа в пространство имён процесса PID 1.
      hostPID: true
      # Toleration ко ВСЕМ taint-ам, чтобы под встал и на GPU-узле, и на управляющем узле, включая
      # taint панели узлов и taint control-plane. Пустой оператор Exists без ключа совпадает с
      # любым taint любого эффекта.
      tolerations:
        - operator: Exists
      containers:
        - name: node-agent
          image: REGISTRY_PLACEHOLDER/kube-sentinel/node-agent:0.13.0
          imagePullPolicy: IfNotPresent
          securityContext:
            # Привилегированный контейнер: полный доступ к узлу нужен, чтобы через nsenter входить
            # в пространство имён хоста и исполнять команды с правами рута.
            privileged: true
          ports: [{containerPort: 9110, hostPort: 9110}]
          env:
            # Имя узла через downward API: возвращается в ответах и попадает в логи и аудит.
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            # Общий секрет доступа: без него /run fail-closed отклоняет все запросы.
            - name: NODEAGENT_TOKEN
              valueFrom: {secretKeyRef: {name: nodeagent-secrets, key: NODEAGENT_TOKEN}}
            - {name: NODEAGENT_PORT, value: "9110"}
          readinessProbe:
            httpGet: {path: /health, port: 9110}
            initialDelaySeconds: 5
            periodSeconds: 15
          # Ресурсы скромные: сервис почти всё время простаивает и лишь изредка исполняет команды.
          resources:
            requests: {cpu: "10m", memory: 32Mi}
            limits: {memory: 96Mi}
