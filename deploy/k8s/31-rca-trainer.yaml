# Тренер классификатора маршрутизации SetFit (активное обучение). CronJob, обучение на
# процессоре, чтобы не конкурировать за видеопамять. Запускается ежечасно, но train.py сам
# решает по порогу новых примеров, дообучать или выйти. Читает примеры из Postgres и настройки
# S3 из секрета sentinel-secrets, выгружает обученную модель в S3. Узел не фиксируется:
# на чужом кластере планировщик размещает под сам; при необходимости привязку к узлу и
# tolerations задаёт владелец через значения чарта.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rca-trainer
  namespace: sentinel
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: rca-trainer
              image: REGISTRY_PLACEHOLDER/kube-sentinel/rca-trainer:0.1.0
              imagePullPolicy: IfNotPresent
              env:
                - name: SENTINEL_POSTGRES_DSN
                  valueFrom: {secretKeyRef: {name: sentinel-secrets, key: SENTINEL_POSTGRES_DSN}}
                - name: SENTINEL_S3_ENDPOINT
                  valueFrom: {secretKeyRef: {name: sentinel-secrets, key: SENTINEL_S3_ENDPOINT}}
                - name: SENTINEL_S3_ACCESS_KEY
                  valueFrom: {secretKeyRef: {name: sentinel-secrets, key: SENTINEL_S3_ACCESS_KEY}}
                - name: SENTINEL_S3_SECRET_KEY
                  valueFrom: {secretKeyRef: {name: sentinel-secrets, key: SENTINEL_S3_SECRET_KEY}}
                - name: SENTINEL_S3_BUCKET
                  valueFrom: {secretKeyRef: {name: sentinel-secrets, key: SENTINEL_S3_BUCKET}}
                - {name: SENTINEL_TRAIN_DEVICE, value: "cpu"}
                - {name: SENTINEL_TRAIN_MIN_NEW, value: "8"}
                - {name: SENTINEL_MODEL_KEY_PREFIX, value: "rca/setfit-router.tar.gz"}
              resources:
                requests: {cpu: "1", memory: 2Gi}
                limits: {memory: 6Gi}
