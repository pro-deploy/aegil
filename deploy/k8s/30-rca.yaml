# Сервис детерминированного анализа RCA. CPU-only, читает окно логов из Loki и отдаёт
# вердикт по пятиполевой схеме. Записывает размеченные примеры в Postgres и синхронизирует
# модель маршрутизации через объектное хранилище S3. Postgres и ключи S3 задаются секретом
# aegil-secrets, который создаёт владелец до применения манифеста (см. README и .env.example).
# Образ собирается и публикуется в реестр как остальные (deploy/build.sh) под единой версией.
apiVersion: v1
kind: Service
metadata:
  name: rca
  namespace: aegil
spec:
  selector: {app: rca}
  ports: [{name: http, port: 9107, targetPort: 9107}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca
  namespace: aegil
spec:
  replicas: 1
  selector: {matchLabels: {app: rca}}
  template:
    metadata:
      labels: {app: rca}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: rca
          image: REGISTRY_PLACEHOLDER/aegil/rca:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 9107}]
          env:
            # Наблюдаемое пространство имён из downward API: селектор потоков Loki строится
            # вокруг него, без зашитого имени исходной платформы.
            - name: AEGIL_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: AEGIL_LOKI_URL, value: "http://loki:3100"}
            # Селектор потоков без зашитого имени: логи наблюдаемого пространства имён.
            - {name: AEGIL_LOKI_QUERY, value: '{namespace="$(AEGIL_NAMESPACE)"}'}
            # Postgres для размеченных примеров и S3 для синхронизации модели маршрутизации.
            - name: AEGIL_POSTGRES_DSN
              valueFrom: {secretKeyRef: {name: aegil-secrets, key: AEGIL_POSTGRES_DSN}}
            - name: AEGIL_S3_ENDPOINT
              valueFrom: {secretKeyRef: {name: aegil-secrets, key: AEGIL_S3_ENDPOINT}}
            - name: AEGIL_S3_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: aegil-secrets, key: AEGIL_S3_ACCESS_KEY}}
            - name: AEGIL_S3_SECRET_KEY
              valueFrom: {secretKeyRef: {name: aegil-secrets, key: AEGIL_S3_SECRET_KEY}}
            - name: AEGIL_S3_BUCKET
              valueFrom: {secretKeyRef: {name: aegil-secrets, key: AEGIL_S3_BUCKET}}
            # Каталог обученной модели (эфемерный, ресинк из S3 при старте и /reload-model) и
            # ключ модели в бакете.
            - {name: AEGIL_SETFIT_DIR, value: "/tmp/setfit-router"}
            - {name: AEGIL_MODEL_KEY_PREFIX, value: "rca/setfit-router.tar.gz"}
            # Контекст Kubernetes в логи через downward API.
            - name: POD_NAME
              valueFrom: {fieldRef: {fieldPath: metadata.name}}
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
          readinessProbe:
            httpGet: {path: /health, port: 9107}
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /health, port: 9107}
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: {cpu: "250m", memory: 768Mi}
            limits: {memory: 2Gi}
---
# Сетевая политика RCA. Порт 9107 сервиса RCA не защищён аутентификацией, поэтому доступ к
# нему закрывается сетевой политикой: обращаться к RCA может только панель агента. Исходящие
# соединения нужны к Loki (чтение окна логов), Postgres и S3 (запись примеров, синхронизация
# модели), а также к kube-dns для разрешения имён.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rca
  namespace: aegil
spec:
  podSelector: {matchLabels: {app: rca}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {matchLabels: {app: agent-panel}}
      ports:
        - {protocol: TCP, port: 9107}
