{{- if .Values.rca.enabled }}
{{- $ns := include "kube-sentinel.namespace" . -}}
{{- $sec := .Values.secrets.main -}}
# Сервис детерминированного разбора первопричин (RCA). CPU-only, читает окно логов из Loki,
# пишет размеченные примеры в Postgres, синхронизирует модель маршрутизации через S3.
apiVersion: v1
kind: Service
metadata:
  name: rca
  namespace: {{ $ns }}
  labels:
{{ include "kube-sentinel.labels" . | indent 4 }}
spec:
  selector: {app: rca}
  ports: [{name: http, port: 9107, targetPort: 9107}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca
  namespace: {{ $ns }}
  labels:
{{ include "kube-sentinel.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.rca.replicas }}
  selector: {matchLabels: {app: rca}}
  template:
    metadata:
      labels:
        app: rca
{{ include "kube-sentinel.labels" . | indent 8 }}
    spec:
      automountServiceAccountToken: false
{{- include "kube-sentinel.imagePullSecrets" . | indent 6 }}
      {{- with .Values.rca.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.rca.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.rca.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: rca
          image: {{ include "kube-sentinel.image" (list . "rca") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{containerPort: 9107}]
          env:
            - name: SENTINEL_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: SENTINEL_LOKI_URL, value: "http://loki:3100"}
            - {name: SENTINEL_LOKI_QUERY, value: '{namespace="$(SENTINEL_NAMESPACE)"}'}
            - name: SENTINEL_POSTGRES_DSN
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.postgresDsn }}}}
            - name: SENTINEL_S3_ENDPOINT
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3Endpoint }}}}
            - name: SENTINEL_S3_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3AccessKey }}}}
            - name: SENTINEL_S3_SECRET_KEY
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3SecretKey }}}}
            - name: SENTINEL_S3_BUCKET
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3Bucket }}}}
            - {name: SENTINEL_SETFIT_DIR, value: "/tmp/setfit-router"}
            - {name: SENTINEL_MODEL_KEY_PREFIX, value: {{ .Values.rca.modelKeyPrefix | quote }}}
            - name: POD_NAME
              valueFrom: {fieldRef: {fieldPath: metadata.name}}
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
          readinessProbe:
            httpGet: {path: /health, port: 9107}
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /health, port: 9107}
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
{{ toYaml .Values.rca.resources | indent 12 }}
{{- if .Values.networkPolicies.enabled }}
---
# Порт RCA не защищён аутентификацией: обращаться к нему может только панель агента.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rca
  namespace: {{ $ns }}
  labels:
{{ include "kube-sentinel.labels" . | indent 4 }}
spec:
  podSelector: {matchLabels: {app: rca}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {matchLabels: {app: agent-panel}}
      ports:
        - {protocol: TCP, port: 9107}
{{- end }}
{{- end }}
