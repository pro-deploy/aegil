{{- if and .Values.rca.enabled .Values.rcaTrainer.enabled }}
{{- $ns := include "kube-sentinel.namespace" . -}}
{{- $sec := .Values.secrets.main -}}
# Тренер классификатора маршрутизации (активное обучение). CronJob, обучение на процессоре.
# Читает примеры из Postgres, выгружает обученную модель в S3.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rca-trainer
  namespace: {{ $ns }}
  labels:
{{ include "kube-sentinel.labels" . | indent 4 }}
spec:
  schedule: {{ .Values.rcaTrainer.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
{{- include "kube-sentinel.imagePullSecrets" . | indent 10 }}
          {{- with .Values.rcaTrainer.nodeSelector }}
          nodeSelector:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.rcaTrainer.tolerations }}
          tolerations:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.rcaTrainer.affinity }}
          affinity:
{{ toYaml . | indent 12 }}
          {{- end }}
          containers:
            - name: rca-trainer
              image: {{ include "kube-sentinel.image" (list . "rca-trainer") }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: SENTINEL_POSTGRES_DSN
                  valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.postgresDsn }}}}
                - name: SENTINEL_S3_ENDPOINT
                  valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3Endpoint }}}}
                - name: SENTINEL_S3_ACCESS_KEY
                  valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3AccessKey }}}}
                - name: SENTINEL_S3_SECRET_KEY
                  valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3SecretKey }}}}
                - name: SENTINEL_S3_BUCKET
                  valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.s3Bucket }}}}
                - {name: SENTINEL_TRAIN_DEVICE, value: {{ .Values.rcaTrainer.trainDevice | quote }}}
                - {name: SENTINEL_TRAIN_MIN_NEW, value: {{ .Values.rcaTrainer.trainMinNew | quote }}}
                - {name: SENTINEL_MODEL_KEY_PREFIX, value: {{ .Values.rca.modelKeyPrefix | quote }}}
              resources:
{{ toYaml .Values.rcaTrainer.resources | indent 16 }}
{{- end }}
