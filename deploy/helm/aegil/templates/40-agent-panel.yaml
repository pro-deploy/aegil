{{- $ns := include "aegil.namespace" . -}}
{{- $sec := .Values.secrets.main -}}
# Панель агента aegil. God-mode-поверхность: только ClusterIP, без Ingress, доступ через
# port-forward. Вход закрыт токеном оператора из секрета (fail-closed).
apiVersion: v1
kind: Service
metadata:
  name: agent-panel
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector: {app: agent-panel}
  ports: [{name: http, port: 9109, targetPort: 9109}]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-panel
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
---
# Узкий RBAC панели в наблюдаемом пространстве: деплойменты на чтение и patch (rollout restart),
# чтение подов, логов и событий, удаление больного пода. Мутации сверх этого недоступны.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-panel-deploy
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-panel-deploy
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: agent-panel-deploy}
subjects:
  - {kind: ServiceAccount, name: agent-panel, namespace: {{ $ns }}}
---
# Чтение узлов (кластерный ресурс) и сводки kubelet через nodes/proxy и nodes/stats. Только чтение.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $ns }}-agent-panel-nodes-read
  labels:
{{ include "aegil.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/stats"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $ns }}-agent-panel-nodes-read
  labels:
{{ include "aegil.labels" . | indent 4 }}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: {{ $ns }}-agent-panel-nodes-read}
subjects:
  - {kind: ServiceAccount, name: agent-panel, namespace: {{ $ns }}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-panel
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.panel.replicas }}
  selector: {matchLabels: {app: agent-panel}}
  template:
    metadata:
      labels:
        app: agent-panel
{{ include "aegil.labels" . | indent 8 }}
    spec:
      serviceAccountName: agent-panel
      enableServiceLinks: false
{{- include "aegil.imagePullSecrets" . | indent 6 }}
      {{- with .Values.panel.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.panel.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.panel.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: agent-panel
          image: {{ include "aegil.image" (list . "agent-panel") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{containerPort: 9109}]
          env:
            - name: AEGIL_OPERATORS
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.operators }}}}
            - name: AEGIL_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: AEGIL_RCA_URL, value: "http://rca:9107"}
            - {name: AEGIL_LLM_PROVIDER, value: {{ .Values.llm.provider | quote }}}
            - {name: AEGIL_LLM_MODEL, value: {{ .Values.llm.model | quote }}}
            - name: AEGIL_LLM_API_KEY
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.llmApiKey }}, optional: true}}
            - {name: AEGIL_LLM_BASE_URL, value: {{ .Values.llm.baseUrl | quote }}}
            - {name: AEGIL_AUTONOMY, value: {{ .Values.autonomy | quote }}}
            - {name: AEGIL_RESTART_ALLOWLIST, value: {{ .Values.policy.restartAllowlist | quote }}}
            - {name: AEGIL_RESTART_DENYLIST, value: {{ .Values.policy.restartDenylist | quote }}}
            - {name: AEGIL_PROTECTED_PATTERNS, value: {{ .Values.policy.protectedPatterns | quote }}}
            - {name: AEGIL_NODE_ROLE_LABEL, value: {{ .Values.policy.nodeRoleLabel | quote }}}
            - {name: AEGIL_NODEAGENT_TIMEOUT, value: {{ .Values.panel.nodeagentTimeout | quote }}}
            - name: AEGIL_NODEAGENT_TOKEN
              valueFrom: {secretKeyRef: {name: {{ $sec.name }}, key: {{ $sec.keys.nodeagentToken }}}}
            - {name: AEGIL_LOKI_URL, value: "http://loki:3100"}
            - {name: AEGIL_LOKI_QUERY, value: '{namespace="$(AEGIL_NAMESPACE)"}'}
            - {name: AEGIL_GRAFANA_URL, value: "http://grafana:3000"}
            - {name: AEGIL_AUDIT, value: "/data/audit.log.jsonl"}
            - {name: AEGIL_GUARDS, value: "/data/agent-guards.log.jsonl"}
            - {name: AEGIL_INCIDENTS_DIR, value: "/data"}
            - {name: AEGIL_INCIDENTS, value: "/data/incidents.log.jsonl"}
            - {name: AEGIL_STATE_DIR, value: "/data"}
            - {name: AEGIL_MCP_SERVERS, value: {{ .Values.mcp.servers | quote }}}
            - {name: AEGIL_VERSION, value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}}
            - {name: AEGIL_UPDATE_CHANNEL_URL, value: {{ .Values.update.channelUrl | quote }}}
            - {name: AEGIL_UPDATE_DEPLOYMENTS, value: {{ .Values.update.deployments | quote }}}
            - name: POD_NAME
              valueFrom: {fieldRef: {fieldPath: metadata.name}}
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
          readinessProbe:
            httpGet: {path: /health, port: 9109}
            initialDelaySeconds: 8
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /health, port: 9109}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
{{ toYaml .Values.panel.resources | indent 12 }}
          volumeMounts:
            - {name: state, mountPath: /data}
      volumes:
        - name: state
          persistentVolumeClaim: {claimName: agent-panel-state}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-panel-state
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.panel.persistence.storageClass }}
  storageClassName: {{ .Values.panel.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests: {storage: {{ .Values.panel.persistence.size }}}
{{- if .Values.networkPolicies.enabled }}
---
# Панель это god-mode-поверхность: входящий трафик на 9109 не разрешён никому, доступ идёт через
# kubectl port-forward (проксирует kube-apiserver, не под-источник).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-panel
  namespace: {{ $ns }}
  labels:
{{ include "aegil.labels" . | indent 4 }}
spec:
  podSelector: {matchLabels: {app: agent-panel}}
  policyTypes: [Ingress]
  ingress: []
{{- end }}
